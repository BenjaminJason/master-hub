<meta property="og:description" content="覆盖112所全球TOP100院校，自动选校匹配、截止日倒计时、申请追踪。纯前端工具，不收集任何用户数据。">

<meta name="mobile-web-app-capable" content="yes">
<style>
:root{
  --bg:#f7f7fb;--bg2:#ffffff;--card:#ffffff;--fg:#1f2430;--muted:#6b7280;
  --border:#e6e6ee;--accent:#4f46e5;--accent2:#6366f1;--tag-bg:#eef0ff;
  --green:#10b981;--yellow:#f59e0b;--red:#ef4444;--radius:14px;
}
body.dark{
  --bg:#14151a;--bg2:#1c1d24;--card:#1c1d24;--fg:#e7e7ee;--muted:#9296a3;
  --border:#2c2e38;--accent:#818cf8;--accent2:#a5b4fc;--tag-bg:#262838;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6}
a{color:inherit}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 22px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.05)}
.logo{font-size:15px;font-weight:800;white-space:nowrap;padding-right:18px}
.tabs{display:flex;gap:0;flex:1;overflow-x:auto}
.tab{padding:15px 14px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);transition:.15s;white-space:nowrap}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.hdr-right{display:flex;align-items:center;gap:9px;margin-left:auto;padding-left:12px}
.thm{background:none;border:1px solid var(--border);border-radius:7px;padding:5px 9px;cursor:pointer;font-size:12.5px;color:var(--muted)}
.gsearch-wrap{position:relative;display:flex;align-items:center}
.gsearch-input{padding:5px 12px 5px 30px;border:1px solid var(--border);border-radius:18px;background:var(--bg);color:var(--fg);font-size:12.5px;outline:none;width:160px;transition:.25s}
.gsearch-input:focus{border-color:var(--accent);width:220px}
.gsearch-ic{position:absolute;left:9px;font-size:12px;pointer-events:none;color:var(--muted)}
.gsearch-drop{position:absolute;top:calc(100% + 7px);right:0;width:320px;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.13);z-index:9999;max-height:400px;overflow-y:auto;display:none}
.gsearch-drop.open{display:block}
.gs-cat{padding:8px 14px 3px;font-size:10.5px;font-weight:800;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;border-top:1px solid var(--border)}
.gs-cat:first-child{border-top:none}
.gs-row{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;transition:.1s}
.gs-row:hover{background:var(--bg)}
.gs-row-name{flex:1;font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gs-row-sub{font-size:11px;color:var(--muted);flex-shrink:0;white-space:nowrap}
.gs-empty{padding:20px 14px;font-size:13px;color:var(--muted);text-align:center}
@media(max-width:700px){.gsearch-input{width:110px}.gsearch-input:focus{width:160px}.gsearch-drop{width:280px;right:-60px}}
.star-btn{display:inline-flex;align-items:center;gap:5px;background:rgba(245,180,0,.14);color:#b45309;border:1px solid rgba(245,180,0,.42);border-radius:8px;padding:5px 10px;font-size:12.5px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap}

.data-note{background:var(--tag-bg);border-bottom:1px solid var(--border);color:var(--muted);font-size:12px;padding:7px 22px;display:flex;align-items:center;gap:10px;line-height:1.5}
.data-note b{color:var(--fg)}
.data-note .dn-close{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;flex-shrink:0}
.data-note.hide{display:none}

section{display:none;max-width:1080px;margin:0 auto;padding:26px 22px 60px}
section.on{display:block}
.ptitle{font-size:21px;font-weight:800;margin-bottom:6px}
.psub{font-size:13.5px;color:var(--muted);margin-bottom:20px;line-height:1.7}

/* ── 双栏院校库 ── */
.db-layout{display:grid;grid-template-columns:184px 1fr;gap:18px;align-items:start}
.country-rail{display:flex;flex-direction:column;gap:10px;position:sticky;top:78px}
.crail-item{position:relative;border:1px solid var(--border);border-radius:12px;padding:14px 14px;cursor:pointer;overflow:hidden;background:var(--card);transition:.15s}
.crail-item .flag{position:absolute;right:-6px;top:-8px;font-size:54px;opacity:.18;line-height:1}
.crail-item .cname{font-size:15px;font-weight:700;position:relative}
.crail-item .ctag{font-size:11.5px;color:var(--muted);margin-top:2px;position:relative}
.crail-item.on{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.crail-item.on .flag{opacity:.32}

.school-list{display:flex;flex-direction:column;gap:10px;max-height:none}
.sl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.sl-head .slh-title{font-size:13.5px;font-weight:700}
.sl-head .slh-sort{font-size:12px;color:var(--muted)}
.school-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;cursor:pointer;transition:.15s}
.school-card:hover{border-color:var(--accent)}
.sc-top{display:flex;align-items:center;gap:12px}
.sc-logo{width:48px;height:48px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-weight:800;font-size:14px;letter-spacing:.3px}
.sc-name{font-size:15px;font-weight:700}
.sc-en{font-size:11.5px;color:var(--muted)}
.sc-id{flex-shrink:0;width:178px}
.sc-mid{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;padding:0 14px;border-left:1px solid var(--border)}
.sc-one{font-size:13px;color:var(--fg);font-style:italic}
.sc-motto{font-size:11.5px;color:var(--accent);line-height:1.4}
.sc-motto .mt-lbl{background:var(--tag-bg);border-radius:4px;padding:1px 5px;font-size:10px;margin-right:5px;font-weight:600}
.sc-badge{font-size:10px;background:rgba(245,158,11,.16);color:#b45309;border-radius:5px;padding:1px 6px;margin-left:7px;font-weight:600;vertical-align:1px}
.sc-right{display:flex;align-items:center;gap:12px;flex-shrink:0;margin-left:10px}
.sc-avg{text-align:center}
.sc-avg b{display:block;font-size:19px;font-weight:800;color:var(--accent);line-height:1}
.sc-avg span{font-size:9px;color:var(--muted)}
.sc-flag{font-size:23px}
.sc-ranks{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}
.rk-pill{font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 9px;color:var(--muted)}
.rk-pill b{color:var(--fg)}
.rk-pill.rk-qs{background:var(--tag-bg);color:var(--accent);border-color:transparent;font-weight:600}
.rk-pill.rk-qs b{color:var(--accent)}
.rk-ref{font-size:10px;color:var(--muted);align-self:center}
.sc-detail{display:none;margin-top:11px;padding-top:11px;border-top:1px dashed var(--border)}
.sc-detail.open{display:block}
.sc-detail p{font-size:13px;line-height:1.7;margin-bottom:8px}
.sc-detail .lab{font-size:12px;font-weight:700;color:var(--accent);margin:8px 0 3px}
.sc-types{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0}
.type-pill{font-size:11px;border-radius:20px;padding:2px 10px;font-weight:600}
.type-taught{background:rgba(99,102,241,.14);color:#4338ca}
.type-research{background:rgba(16,185,129,.14);color:#047857}
.tag{display:inline-block;font-size:11px;background:var(--tag-bg);color:var(--accent);border-radius:20px;padding:2px 9px;margin:2px 3px 2px 0}
.sc-link{display:inline-block;margin-top:6px;font-size:12.5px;color:var(--accent);font-weight:600;text-decoration:none}
.sc-apply-link{margin-left:12px;color:#059669}
.sc-apply-link:hover{text-decoration:underline}
.mine-ck-hint{background:var(--tag-bg);border:1px solid var(--border);border-radius:10px;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;font-size:12.5px;color:var(--muted);margin-bottom:12px;gap:8px}
.mine-ck-link{color:var(--accent);font-weight:600;cursor:pointer;text-decoration:none;white-space:nowrap;background:none;border:none;font-size:12.5px;padding:0}
.mine-ck-link:hover{text-decoration:underline}

/* ── 通用卡片 ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.card h3{font-size:15px;font-weight:700;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.card p,.card li{font-size:13.5px;line-height:1.75}
.card ul{padding-left:18px;display:flex;flex-direction:column;gap:5px}
.hl{color:var(--accent);font-weight:600}

/* ── 国家概览 ── */
.country-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.ctab{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
.ctab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.ctab-mine{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.ov-hero{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:16px;position:relative;overflow:hidden}
.ov-hero .ov-flag{position:absolute;right:10px;top:-10px;font-size:96px;opacity:.14}
.ov-hero h2{font-size:20px;font-weight:800;position:relative}
.ov-hero .ov-tag{font-size:13px;color:var(--accent);font-weight:600;margin-top:2px;position:relative}
.ov-feats{display:flex;flex-direction:column;gap:9px;margin-top:14px;position:relative}
.ov-feat{display:flex;gap:10px;font-size:13.5px;line-height:1.6}
.ov-feat .of-ic{flex-shrink:0;font-size:16px}
.ov-fit{margin-top:14px;background:var(--tag-bg);border-radius:10px;padding:11px 14px;font-size:13px;position:relative}

/* ── 时间轴 ── */
.tl-item{display:flex;gap:14px;margin-bottom:4px}
.tl-rail{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:13px;height:13px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.tl-line{width:2px;flex:1;background:var(--border);margin:3px 0}
.tl-body{padding-bottom:18px}
.tl-phase{font-size:14px;font-weight:700}
.tl-when{font-size:12px;color:var(--accent);font-weight:600;margin-bottom:5px}
.tl-body ul{padding-left:17px;font-size:13px;color:var(--fg);display:flex;flex-direction:column;gap:3px}

/* ── 选校匹配（重构） ── */
.match-form{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:18px}
.mf-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.mf-lang{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.mf-g label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px}
.mf-g input,.mf-g select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--fg);font-size:13.5px;font-family:inherit;box-sizing:border-box}
.mf-hint{font-size:11px;color:var(--muted);margin-top:3px;min-height:14px}
.match-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:14px;cursor:pointer;transition:.15s}
.match-btn:hover{opacity:.88}
.match-summary{background:var(--tag-bg);border-radius:10px;padding:10px 18px;margin-bottom:14px;font-size:13px;color:var(--muted);display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.ms-num{font-weight:700;color:var(--fg);font-size:15px}
.mprog-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;gap:13px;align-items:flex-start}
.mprog-lvl{border-radius:6px;font-size:11.5px;font-weight:700;padding:3px 9px;flex-shrink:0;margin-top:2px;white-space:nowrap}
.lvl-reach{background:rgba(239,68,68,.12);color:#b91c1c}
.lvl-match{background:rgba(16,185,129,.12);color:#047857}
.lvl-safe{background:rgba(99,102,241,.12);color:#4338ca}
.mprog-main{flex:1;min-width:0}
.mprog-school{font-size:14px;font-weight:700;margin-bottom:2px}
.mprog-qs{font-size:11.5px;color:var(--muted);margin-left:6px}
.mprog-prog{font-size:13px;font-weight:600;margin-bottom:5px}
.mprog-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.mprog-field{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.f-cs{background:rgba(59,130,246,.12);color:#2563eb}
.f-bus{background:rgba(245,158,11,.12);color:#b45309}
.f-eng{background:rgba(16,185,129,.12);color:#047857}
.f-sci{background:rgba(139,92,246,.12);color:#6d28d9}
.f-soc{background:rgba(236,72,153,.12);color:#be185d}
.f-art{background:rgba(251,146,60,.12);color:#c2410c}
.mprog-gap{font-size:12px;font-weight:700}
.gap-pos{color:#4338ca}.gap-neg{color:#b91c1c}.gap-zero{color:#047857}
.mprog-note{font-size:12.5px;color:var(--muted);line-height:1.65;margin:3px 0 7px}
.mprog-res{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);cursor:pointer;transition:.15s;color:var(--muted);background:transparent}
.mprog-res:hover{border-color:var(--accent);color:var(--accent);background:var(--tag-bg)}

/* ── 追踪 ── */
.mark-filter{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);cursor:pointer;margin-left:12px}
.prog-select{font-size:11.5px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-family:inherit;cursor:pointer}
.prog-select.st-pick{background:rgba(245,158,11,.15);color:#b45309;border-color:transparent;font-weight:600}
.prog-select.st-applying{background:rgba(99,102,241,.15);color:#4338ca;border-color:transparent;font-weight:600}
.prog-select.st-submitted{background:rgba(14,165,233,.15);color:#0369a1;border-color:transparent;font-weight:600}
.prog-select.st-offer{background:rgba(16,185,129,.15);color:#047857;border-color:transparent;font-weight:600}
.prog-select.st-reject{background:rgba(107,114,128,.15);color:#6b7280;border-color:transparent}
.mine-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.mt-hint{flex:1;font-size:12px;color:var(--muted);min-width:0}
.mt-actions{display:flex;gap:6px;flex-wrap:wrap}
.mt-btn{padding:6px 13px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-size:12.5px;cursor:pointer;transition:.15s;white-space:nowrap;display:inline-flex;align-items:center;text-decoration:none}
.mt-btn:hover{border-color:var(--accent);color:var(--accent)}
.mt-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.mt-btn.primary:hover{opacity:.86}
.mine-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.mine-stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;text-align:center;min-width:54px}
.mine-stat .ms-num{font-size:20px;font-weight:800}
.mine-stat .ms-lbl{font-size:11px;color:var(--muted)}
.mine-stat.st-pick .ms-num{color:#b45309}
.mine-stat.st-applying .ms-num{color:#4338ca}
.mine-stat.st-submitted .ms-num{color:#0369a1}
.mine-stat.st-offer .ms-num{color:#047857}
.mine-stat.st-reject .ms-num{color:#6b7280}
.mine-ctabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.mine-ctab{padding:5px 13px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12.5px;cursor:pointer;transition:.15s}
.mine-ctab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.mine-scard{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.mine-scard-hd{display:flex;align-items:center;gap:10px;padding:11px 15px;background:var(--tag-bg);border-bottom:1px solid var(--border)}
.msh-name{font-weight:700;font-size:14px}
.msh-sub{font-size:12px;color:var(--muted)}
.mine-prog-row{display:flex;align-items:center;gap:8px;padding:9px 15px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.mpr-prog{flex:1;min-width:120px}
.mpr-prog input{border:none;background:transparent;font-size:13px;color:var(--fg);width:100%;outline:none;padding:2px 0;border-bottom:1px solid transparent;transition:.15s;box-sizing:border-box}
.mpr-prog input:focus{border-bottom-color:var(--accent)}
.mpr-prog input::placeholder{color:var(--muted)}
.mpr-dl input[type=date]{border:none;background:transparent;font-size:12px;color:var(--muted);outline:none;width:116px;cursor:pointer}
.mpr-note{width:100%;padding:0 15px 9px;margin-top:-4px}
.mpr-note input{width:100%;border:none;border-bottom:1px solid var(--border);background:transparent;font-size:12px;color:var(--muted);padding:3px 0;outline:none;box-sizing:border-box;transition:.15s}
.mpr-note input:focus{border-bottom-color:var(--accent)}
.mpr-del{color:var(--muted);background:none;border:none;font-size:14px;cursor:pointer;padding:3px 6px;border-radius:5px;transition:.15s;flex-shrink:0}
.mpr-del:hover{background:rgba(239,68,68,.12);color:#ef4444}
.mine-scard-ft{padding:8px 15px;display:flex;justify-content:flex-end;border-top:1px solid var(--border)}
.mine-add-prog{font-size:12px;color:var(--accent);cursor:pointer;background:none;border:none;padding:0;font-weight:600}
.mine-add-prog:hover{opacity:.75}
.mine-add-panel{background:var(--card);border:2px dashed var(--accent);border-radius:12px;padding:18px 20px;margin-bottom:14px}
.mine-add-panel h4{font-size:14px;font-weight:700;margin-bottom:14px}
.map-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.map-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.map-fg label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px}
.map-fg input,.map-fg select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--fg);box-sizing:border-box;font-family:inherit}
.map-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}
.mine-empty{text-align:center;color:var(--muted);padding:32px 20px;font-size:13.5px;line-height:1.9}
@media(max-width:600px){.map-grid{grid-template-columns:1fr}.map-grid3{grid-template-columns:1fr 1fr}}

.fund-amt{font-size:12.5px;font-weight:600;color:var(--fg);margin-bottom:5px}

/* ── 奖学金追踪面板 ── */
.mine-schol-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden}
.mine-schol-hd{padding:10px 15px;display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13.5px;font-weight:700;user-select:none}
.mine-schol-hd:hover{background:var(--tag-bg)}
.msp-badge{font-size:11px;background:var(--accent);color:#fff;padding:1px 7px;border-radius:10px;font-weight:700}
.mine-schol-body{padding:10px 15px 14px}
.mine-schol-body.hidden{display:none}
.msp-add-form{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px;padding:9px 11px;background:var(--tag-bg);border-radius:8px;align-items:center}
.msp-inp{flex:1;min-width:100px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg);color:var(--fg);outline:none}
.msp-inp:focus{border-color:var(--accent)}
.msp-sel{flex:0 0 auto;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg);color:var(--fg);cursor:pointer}
.msp-add-btn{padding:5px 13px;border-radius:6px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
.msp-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.msp-row:last-child{border-bottom:none}
.msp-name{font-size:13px;font-weight:600;flex:1;min-width:90px}
.msp-meta{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.msp-stat{font-size:11px;padding:2px 7px;border-radius:10px;font-weight:700;white-space:nowrap}
.msp-plan{background:#dbeafe;color:#1e40af}.msp-applied{background:#fef3c7;color:#92400e}
.msp-wait{background:#ede9fe;color:#5b21b6}.msp-got{background:#d1fae5;color:#065f46}.msp-rej{background:#fee2e2;color:#991b1b}
.msp-rm{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px 5px;border-radius:4px;flex-shrink:0}
.msp-rm:hover{color:#ef4444;background:var(--tag-bg)}
.msp-empty{text-align:center;color:var(--muted);font-size:12.5px;padding:10px 0}
/* ── 签证卡片 v2 ── */
.visa-meta-row{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:14px}
.visa-mc{background:var(--tag-bg);border:1px solid var(--border);border-radius:8px;padding:8px 13px;font-size:12px;flex:1;min-width:120px}
.visa-mc b{display:block;font-size:10.5px;color:var(--muted);font-weight:600;margin-bottom:3px;text-transform:uppercase}
.visa-sec{margin-bottom:14px}
.visa-sec-hd{font-size:12.5px;font-weight:800;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.visa-ck-reset{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0;margin-left:auto;opacity:.7}
.visa-mat-list{display:flex;flex-direction:column;gap:5px}
.visa-mat-item{display:flex;align-items:flex-start;gap:9px;cursor:pointer;user-select:none}

.visa-cb.ck{background:var(--accent);border-color:var(--accent);color:#fff}
.visa-mat-txt{font-size:12.5px;line-height:1.55}
.visa-mat-txt.ck{text-decoration:line-through;color:var(--muted)}
.visa-tips{list-style:none;padding:0;margin:0}
.visa-tips li{font-size:12.5px;padding:5px 0 5px 22px;position:relative;line-height:1.6;border-bottom:1px solid var(--border)}
.visa-tips li:last-child{border-bottom:none}
.visa-tips li::before{content:"⚠️";position:absolute;left:0;font-size:11px;top:5px}
.visa-post{background:var(--tag-bg);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 14px;font-size:12.5px;line-height:1.7;margin-bottom:12px}
.visa-links-row{display:flex;flex-wrap:wrap;gap:7px}
.visa-lnk{font-size:12px;padding:4px 11px;border-radius:16px;background:var(--card);border:1px solid var(--border);color:var(--accent);text-decoration:none;font-weight:600;transition:.15s}
.visa-lnk:hover{background:var(--accent);color:#fff}
@media(max-width:600px){.visa-mc{min-width:100px}.msp-add-form{gap:5px}}
/* 签证详情卡片 */
.visa-guide-grid{display:flex;flex-direction:column;gap:13px}
.vg-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:17px 19px}
.vg-card h3{font-size:13.5px;font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:7px}
.vg-tl{display:flex;flex-direction:column;gap:10px}
.vg-tl-row{display:flex;gap:12px;align-items:flex-start}
.vg-tl-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.vg-tl-main{font-size:13px;font-weight:700}
.vg-tl-when{font-size:12px;color:var(--accent);font-weight:400;margin-left:5px}
.vg-tl-note{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.6}
.vg-mat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
@media(max-width:550px){.vg-mat-grid{grid-template-columns:1fr}}
.vg-mat-cell{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;cursor:pointer;transition:.15s;display:flex;align-items:flex-start;gap:8px}
.vg-mat-cell:hover{border-color:var(--accent)}
.vg-mat-cell.ck{border-color:var(--accent);background:rgba(99,102,241,.06)}
.vg-mat-cb{width:16px;height:16px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:.15s}
.vg-mat-cb.ck{background:var(--accent);border-color:var(--accent);color:#fff}
.vg-mat-txt{font-size:12.5px;font-weight:600;flex:1}
.vg-mat-sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5}
.vg-mat-txt.ck{text-decoration:line-through;color:var(--muted)}
.vg-tips-list{display:flex;flex-direction:column;gap:7px}
.vg-tip{background:rgba(245,158,11,.07);border-left:3px solid #f59e0b;border-radius:0 8px 8px 0;padding:8px 12px;font-size:12.5px;line-height:1.6}
.vg-qa{display:flex;flex-direction:column;gap:8px}
.vg-qa-item{border:1px solid var(--border);border-radius:8px;padding:10px 13px}
.vg-qa-q{font-size:12.5px;font-weight:700;color:var(--accent)}
.vg-qa-a{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.6}
.vg-arrival{display:grid;grid-template-columns:1fr 1fr;gap:7px}
@media(max-width:550px){.vg-arrival{grid-template-columns:1fr}}
.vg-arr-cell{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
.vg-arr-lbl{font-size:12.5px;font-weight:600}
.vg-arr-note{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.5}
.vg-post-box{background:var(--tag-bg);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:11px 14px;font-size:13px;line-height:1.7}
.vg-pct-bar{height:5px;background:var(--border);border-radius:3px;margin:6px 0 2px;overflow:hidden}
.vg-pct-fill{height:5px;background:var(--accent);border-radius:3px;transition:.3s}
/* ── 院校搜索 & 筛选 ── */
.db-filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.db-search{flex:1;min-width:160px;padding:7px 12px;border:1px solid var(--border);border-radius:20px;background:var(--bg);color:var(--fg);font-size:13px;outline:none;transition:.15s}
.db-search:focus{border-color:var(--accent)}
.db-fsel{padding:6px 10px;border:1px solid var(--border);border-radius:16px;background:var(--bg);color:var(--fg);font-size:12.5px;cursor:pointer;outline:none}
.db-fsel:focus{border-color:var(--accent)}
.db-filter-count{font-size:12px;color:var(--muted);white-space:nowrap;margin-left:2px}
/* ── 国家概览深化 ── */
.ov-score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
@media(max-width:540px){.ov-score-grid{grid-template-columns:repeat(3,1fr)}}
.ov-sc-cell{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 8px;text-align:center}
.ov-sc-label{font-size:10.5px;color:var(--muted);font-weight:600;margin-bottom:5px;text-transform:uppercase}
.ov-sc-val{font-size:18px;font-weight:900;line-height:1}
.ov-sc-dots{display:flex;justify-content:center;gap:3px;margin-top:4px}
.ov-sc-dot{width:7px;height:7px;border-radius:50%;background:var(--border)}
.ov-sc-dot.on{background:var(--accent)}
.ov-stat-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.ov-stat-chip{background:var(--tag-bg);border:1px solid var(--border);border-radius:8px;padding:7px 12px;flex:1;min-width:110px}
.ov-stat-chip b{display:block;font-size:16px;font-weight:800;color:var(--fg)}
.ov-stat-chip span{font-size:11px;color:var(--muted)}
.ov-pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:500px){.ov-pros-cons{grid-template-columns:1fr}}
.ov-pros{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:9px;padding:11px 13px}
.ov-cons{background:#fef2f2;border:1px solid #fecaca;border-radius:9px;padding:11px 13px}
.dark .ov-pros{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.25)}
.dark .ov-cons{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.25)}
.ov-pros h5{color:#065f46;font-size:12px;margin-bottom:6px}.dark .ov-pros h5{color:#34d399}
.ov-cons h5{color:#991b1b;font-size:12px;margin-bottom:6px}.dark .ov-cons h5{color:#f87171}
.ov-pros li,.ov-cons li{font-size:12px;line-height:1.7;color:var(--fg);list-style:none;padding-left:14px;position:relative}
.ov-pros li::before{content:"✓";position:absolute;left:0;color:#10b981}
.ov-cons li::before{content:"✗";position:absolute;left:0;color:#ef4444}
/* ── 就业 & 生活深化 ── */
.career-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:600px){.career-grid{grid-template-columns:1fr}}
.career-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px}
.career-card h4{font-size:12.5px;font-weight:700;margin-bottom:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.career-stat-main{font-size:17px;font-weight:800;color:var(--fg);line-height:1.2}
.career-stat-sub{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.5}
.career-visa-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;margin-bottom:6px}
.cvb-green{background:#d1fae5;color:#065f46}.cvb-yellow{background:#fef3c7;color:#92400e}.cvb-red{background:#fee2e2;color:#991b1b}
.career-ind-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.career-ind-tag{background:var(--tag-bg);border:1px solid var(--border);border-radius:12px;font-size:11.5px;padding:3px 9px}
.career-wlb-stars{display:flex;gap:2px;font-size:16px;margin-bottom:4px}
.career-migr-bar{height:6px;border-radius:3px;margin:6px 0 4px}
.career-tip-box{background:rgba(99,102,241,.07);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:9px 12px;font-size:12.5px;line-height:1.6;margin-top:12px}

.cr-toggle{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.cr-toggle-btn{padding:7px 18px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
.cr-toggle-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.cr-school-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.cr-sc-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:13px 15px}
.cr-sc-top{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.cr-sc-logo{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:800;color:#fff;flex-shrink:0}
.cr-sc-name{font-size:13px;font-weight:700;line-height:1.3}
.cr-sc-meta{font-size:11px;color:var(--muted)}
.cr-prog{font-size:12px;color:var(--muted);margin-bottom:6px}
.cr-cos{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.cr-co{font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:2px 7px}
.cr-intern{font-size:12px;line-height:1.55;margin-bottom:7px;color:var(--fg)}
.cr-city-row{display:flex;align-items:center;gap:5px;font-size:12px;margin-bottom:5px}
.cr-city-stars{color:#f59e0b;font-size:12px}
.cr-lb{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:7px}
.cr-lb-c{border-radius:8px;padding:7px 9px;font-size:11.5px;line-height:1.5}
.cr-local{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8}
.cr-back{background:#fff7ed;border:1px solid #fed7aa;color:#c2410c}
.cr-lb-lbl{font-weight:700;font-size:11px;margin-bottom:2px}
.cr-kw-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.cr-kw-btn{font-size:11px;padding:2px 8px;border-radius:9px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer}
.cr-kw-btn:hover{border-color:var(--accent);color:var(--accent)}
/* 回国落户政策 */
.return-section{margin-bottom:16px}
.return-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:14px}
.return-table th{background:var(--card);padding:8px 11px;text-align:left;border-bottom:2px solid var(--border);font-size:12px;font-weight:700;white-space:nowrap}
.return-table td{padding:7px 11px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5}
.return-table tr:hover td{background:rgba(99,102,241,.03)}
.qs-badge{display:inline-block;font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:7px;margin-right:3px;white-space:nowrap}
.qs-top50{background:#fef3c7;color:#92400e}
.qs-top100{background:#dbeafe;color:#1e40af}
.qs-top200{background:#ede9fe;color:#4c1d95}
.qs-top500{background:#f3f4f6;color:#374151}
.return-track-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
.rt-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px}
.rt-title{font-size:13px;font-weight:700;margin-bottom:5px}
.rt-qs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.rt-note{font-size:12px;color:var(--muted);line-height:1.55}
/* 奖学金预设 */
.schol-preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sp-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;transition:.15s}
.sp-card:hover{border-color:var(--accent)}
.sp-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.sp-name{font-size:12.5px;font-weight:700}
.sp-add{font-size:11px;color:var(--accent);font-weight:700;flex-shrink:0}
.sp-meta{font-size:11px;color:var(--muted);line-height:1.5}
/* 院校库 → 嵌入学生评分 */
.sc-voice-embed{border-top:1px solid var(--border);margin-top:11px;padding-top:11px}
.sc-ve-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.sc-ve-stars{font-size:12px;color:#f59e0b}
.sc-ve-num{font-size:12px;font-weight:700}
.sc-ve-life{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:7px}

  .schol-preset-grid{grid-template-columns:1fr}
  .ov-score-grid{grid-template-columns:repeat(3,1fr)}
  .svc-grid{grid-template-columns:1fr}
  .blogger-grid{grid-template-columns:1fr}
  .vc-quote-grid{grid-template-columns:1fr}
  .career-grid{grid-template-columns:1fr}
  .db-filter-bar{flex-direction:column}

  .vg-mat-grid{grid-template-columns:1fr}
}
/* ── 时间轴倒计时 ── */
.tl-countdown{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}

.tl-cd-info{flex:1;min-width:150px}
.tl-cd-title{font-size:13px;font-weight:700}
.tl-cd-note{font-size:11.5px;color:var(--muted);margin-top:2px}
.tl-now-tag{display:inline-block;background:#d1fae5;color:#065f46;border-radius:10px;font-size:10px;font-weight:700;padding:1px 7px;margin-left:6px;vertical-align:middle}
/* ── 院校对比 ── */
.sc-fav-btn{font-size:13px;padding:2px 7px;border-radius:12px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:.15s;flex-shrink:0;line-height:1.6}

#fav-filter-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.sc-cmp-btn{font-size:11px;padding:3px 9px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-weight:600;transition:.15s;flex-shrink:0}
.sc-cmp-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

<script>
/* logic — data loaded from data.js */
let cmpList=[];

/* 申请要点（硕士 vs 博士 / 通用） */
const GUIDE=[
  {ic:"🎯",t:"第一步：授课型 vs 研究型，先定性质再选校",
    b:`<ul>
      <li><b>授课型（Taught MSc/MA/MEng）</b>：上课 + 考试 + 小论文为主，就业导向，1年制居多，不需要套磁导师，是绝大多数人的选择</li>
      <li><b>研究型（MRes/MPhil）</b>：以做课题为主，偏升博方向，通常需要先联系导师，部分提供资助</li>
      <li><b>怎么选</b>：想工作→授课型；想继续读博→研究型或授课型都可以，看目标院校博士申请偏好</li>
      <li>美国 MS 通常介于两者之间，可含 thesis（论文）或 coursework 方向，申请时备注方向偏好</li>
    </ul>`,
    res:[{type:"xhs",kw:"硕士授课型研究型区别 留学选择"},{type:"bili",kw:"留学硕士类型选择 授课研究型对比"}]},

  {ic:"🌍",t:"选哪个国家：6个维度比完再决定",
    b:`<div style="display:flex;flex-direction:column;gap:7px">
      ${[
        ["💰 总费用","英/澳/美/加 学费高；德/荷/法公立几乎免费+生活成本低；新/港居中",""],
        ["📅 学制","英国 1 年制（省时省钱）；澳/美/加 1.5–2 年；德法 2 年",""],
        ["🛂 毕业工签","澳 485（2–4年）/ 英 Graduate Route（2年）/ 美 OPT+STEM（3年）含金量最高",""],
        ["🌏 移民路径","澳/加路径最清晰；英/德/荷可5年永居；美绿卡排期长、H-1B抽签",""],
        ["🏫 院校排名","看专业排名而非学校综排；QS专业排名权重更高",""],
        ["🗣️ 语言要求","英/澳/加 雅思/托福；德法荷可英语授课；日本/韩国/法国语言加分明显",""],
      ].map(([label,text])=>`<div style="display:flex;gap:9px;align-items:flex-start">
        <span style="flex-shrink:0;font-weight:700;min-width:90px;font-size:12.5px">${label}</span>
        <span style="font-size:12.5px;color:var(--muted);line-height:1.6">${text}</span>
      </div>`).join("")}
    </div>`,
    res:[{type:"xhs",kw:"留学选国家 英国澳洲美国加拿大对比 2025"},{type:"bili",kw:"去哪个国家留学最划算 全面对比"}]},

  {ic:"🏫",t:"院校背景 & 均分：能否递的关键门槛",
    b:`<ul>
      <li><b>英国 / 澳洲</b>：明确认「院校 list」，985/211 与双非要求落差大（有时差 5–10 分均分），投前必查官网 entry requirements</li>
      <li><b>均分换算</b>：英国通常 80+ = First Class；85+ 更有竞争力；澳洲 75/100 ≈ 3.0/4.0；美国看百分制 GPA 折算</li>
      <li><b>美国/加拿大/新加坡</b>：综合评估（GPA + 标化 + 文书 + 背景），均分门槛相对灵活，但科研/实习能补分</li>
      <li><b>双非同学</b>：优先考虑英国/澳洲有明确双非录取案例的院校；或转战美国（综合评估更友好）</li>
      <li>在读生：第 4–6 学期均分提高 1–2 分，相当于打开一档院校门，值得冲刺</li>
    </ul>`,
    res:[{type:"xhs",kw:"双非留学 英国硕士 均分要求 院校list"},{type:"bili",kw:"留学GPA均分提升 成绩换算 院校要求"}]},

  {ic:"📝",t:"个人陈述 PS / SOP：定制度决定录取率",
    b:`<ul>
      <li><b>英式 PS（个人陈述）</b>：500–800字，重点写「为什么这个课程」+ 学习/工作经历与课程的联系，不必大谈未来规划</li>
      <li><b>美/加式 SOP（Statement of Purpose）</b>：800–1200字，三段式逻辑：过去经历 → 为何选这个项目 → 毕业后计划；每校必须重写「why this program」段</li>
      <li><b>最常见错误</b>：通篇流水账简历复述；未提及具体课程名/导师名；模板味太重招生官秒识别</li>
      <li><b>质检清单</b>：每份 PS/SOP 是否含目标学校课程名 ✓ / 是否含具体经历细节 ✓ / 是否说清逻辑链 ✓</li>
      <li>AI辅助写初稿可以，但最终措辞必须人工打磨，过度AI感也会被识别</li>
    </ul>`,
    res:[{type:"xhs",kw:"留学个人陈述PS SOP写法 实例模板"},{type:"bili",kw:"英国美国留学 文书PS SOP写作技巧教程"}]},

  {ic:"✉️",t:"推荐信：如何拿到真正有分量的三封",
    b:`<ul>
      <li><b>谁来写最有效</b>：能具体评价你学术能力的教授（带过课/论文/项目）> 研究所导师 > 实习/工作主管；挂名信招生官看得出来</li>
      <li><b>提前多久找</b>：至少提前 6–8 周，给教授足够时间；给他们提供「素材包」：简历、PS草稿、你们互动的具体案例、每校截止日期</li>
      <li><b>英国/澳洲</b>：多数需要 2 封学术推荐信，实习主管信可作补充；美国通常需要 3 封</li>
      <li><b>一封强推胜三封弱推</b>：推荐人亲自撰写、有具体例子的强推，远好过教授只签名的格式信</li>
      <li>申请季中推荐人邮箱系统会收到大量邀请，提前统一提醒避免漏发</li>
    </ul>`,
    res:[{type:"xhs",kw:"留学推荐信怎么找 教授 强推弱推区别"},{type:"bili",kw:"留学申请推荐信 怎么准备 素材包"}]},

  {ic:"🗣️",t:"语言考试：何时备考、如何刷分最高效",
    b:`<ul>
      <li><b>时间节点</b>：英澳申请通常要求大三下或大四上出分；9–10月开始网申的话，暑假出一次分最理想</li>
      <li><b>雅思 vs 托福</b>：英/澳/港大多接受雅思，美国更多接受托福；部分专业要求 UKVI 雅思（不同于普通学术版），报名前确认</li>
      <li><b>刷分策略</b>：整体 6.5 卡小分（如写作 6.0）的，针对性突破弱项比重刷整体更高效；连续两次提升有限建议换科目（雅→托、托→雅）</li>
      <li><b>Duolingo</b>：越来越多院校接受，备考成本低，但不能完全替代传统考试（查官网接受情况）</li>
      <li>有些学校接受「有条件语言」（Conditional Offer），先递材料占位，毕业前补语言成绩</li>
    </ul>`,
    res:[{type:"xhs",kw:"雅思7分备考经验 留学语言考试 2025"},{type:"bili",kw:"雅思托福备考方法 口语写作提分 经验分享"}]},

  {ic:"🔬",t:"背景提升：哪些经历真正能加分",
    b:`<ul>
      <li><b>科研经历</b>：含金量最高（尤其美国/新加坡/港科）；不需要顶刊，但要有 research question + 方法 + 结论，能在 SOP 里讲出故事</li>
      <li><b>实习 / 工作经历</b>：对就业导向的授课硕士（商科/CS/工程）很有帮助；与申请方向相关性第一</li>
      <li><b>竞赛 / 项目</b>：数模/ACM/商赛等国际赛事有加分，但本质是素材，要能提炼出能力亮点，不是简单列奖</li>
      <li><b>均分 vs 背景</b>：均分达线前先补均分；均分已达后再花时间做背景提升，次序别搞反</li>
      <li>中介「背景提升项目」质量参差不齐，优先选有真实导师的学术项目，而非付钱挂名</li>
    </ul>`,
    res:[{type:"xhs",kw:"留学背景提升 科研实习 哪个重要 经验"},{type:"bili",kw:"留学申请背景提升 科研经历怎么写 SOP"}]},

  {ic:"🔄",t:"申请节奏：英澳尽早递，美国卡 deadline",
    b:`<ul>
      <li><b>英国</b>：rolling 滚动录取，通常 9–10 月开放，热门项目（LSE/帝理 CS/商科）圣诞前名额可能告急，越早越好</li>
      <li><b>澳洲</b>：同为 rolling，2 月 / 7 月两个开学季；7 月入学比 2 月入学早出 485 工签，战略性考虑</li>
      <li><b>美国</b>：固定 deadline（多在 12 月 1 日 – 次年 1 月 15 日），9 月前敲定选校 + 开始文书，10–11 月集中提交</li>
      <li><b>加拿大 / 新加坡</b>：按各校官网，通常 1–3 月截止；SDS 加签通道需额外材料提前准备</li>
      <li>德国：需先做 APS 学历认证（1–4 个月），整个周期比其他国家长，最先开始准备</li>
    </ul>`,
    res:[{type:"xhs",kw:"英国留学申请节奏 几月递交最好 rolling录取"},{type:"bili",kw:"美国留学申请时间线 deadline 文书准备顺序"}]},

  {ic:"💻",t:"网申操作：容易翻车的细节",
    b:`<ul>
      <li><b>成绩单格式</b>：英美多数接受学校盖章扫描件（先递电子版，录取后寄原件）；部分校要 WES 认证（耗时 2–6 周，提前办）</li>
      <li><b>推荐信系统</b>：申请时填推荐人邮箱，系统自动发邀请；务必填推荐人常用邮箱，避免漏发；提交前确认「推荐人已接受邀请」</li>
      <li><b>申请费</b>：多数学校 $50–150/次，不可退；提前确认选校清单再付款，不要冲动申</li>
      <li><b>护照姓名</b>：全程用护照英文全名，与标化考试证书一致，否则审核可能出问题</li>
      <li><b>材料版本控制</b>：建立文档命名规则（学校名_文书类型_日期.pdf），避免提交错版本</li>
      <li>部分系统（如 ApplyWeb / Embark）自动保存不稳定，填完一节立刻 Save，不要一次性填完再提交</li>
    </ul>`,
    res:[{type:"xhs",kw:"留学网申 常见踩坑 WES成绩单 推荐信注意"},{type:"bili",kw:"英美留学申请系统 网申细节 避坑指南"}]},

  {ic:"💰",t:"费用规划：别只看排名，先算出得起吗",
    b:`<ul>
      <li><b>总费用 = 学费 + 生活费 + 签证 + 机票 + 其他</b>；英美澳加年均 ¥30–60 万，德法荷 ¥8–20 万（学费低）</li>
      <li><b>硕士奖学金现实</b>：授课型全奖极少（&lt;5%）；部分减免 £2,000–10,000 常见；新加坡/香港政府奖学金竞争激烈但全额</li>
      <li><b>汇率风险</b>：英镑/澳元汇率波动可能在 2 年学习期内影响 ¥5–15 万；可考虑分批换汇</li>
      <li><b>生活成本差异</b>：伦敦/新加坡 &gt; 悉尼/多伦多 &gt; 曼城/爱丁堡 &gt; 德国城市；非核心城市生活费可省 30–40%</li>
      <li>把钱花在「进得去的学校」比「进不去的学校」多申几所更值得</li>
    </ul>`,
    res:[{type:"xhs",kw:"留学费用预算 英国澳洲美国 一年花多少钱"},{type:"bili",kw:"留学经费规划 奖学金 生活成本 学费对比"}]},

  {ic:"📚",t:"选专业别只看名字，先看课程 Modules",
    b:`<ul>
      <li>同叫「数据科学 MSc」，A 校 80% 是统计方法课，B 校 80% 是工程实现课，就业方向完全不同</li>
      <li><b>怎么看课程</b>：官网找「Modules / Courses」页面，看每学期的具体科目，对照自己兴趣和目标岗位</li>
      <li><b>看导师</b>：研究型项目尤其重要；授课型也可以提前看系里导师方向，表明兴趣往往加分</li>
      <li><b>看就业去向</b>：不少院校公布「Employment Report」/ 「Graduate Destinations」，看往届毕业生去了哪里</li>
      <li>网申前逐条比「课程 vs 我的背景 vs 我的目标工作」，这个步骤决定你的 PS 写得是否有说服力</li>
    </ul>`,
    res:[{type:"xhs",kw:"留学选专业 课程内容怎么看 就业方向对比"},{type:"bili",kw:"留学硕士选专业 modules课程内容分析 经验"}]},

  {ic:"🏗️",t:"科学的选校梯队：冲稳保怎么配",
    b:`<ul>
      <li><b>基本比例建议</b>：10所校 → 3冲（期望拿到概率 &lt;30%）/ 4匹配（30–70%）/ 3保底（&gt;80%），不同风险偏好可调整</li>
      <li><b>英国梯队参考</b>：G5院校（牛剑 ICL UCL LSE）→ 罗素集团前10 → QS 100以内 → QS 200以内，四档选校铺开</li>
      <li><b>保底校也要认真读</b>：「拿来用」的保底校录取后也可能是最终选择，不要只申不认真研究</li>
      <li><b>同一所校多专业申请</b>：一般允许，但申请费分开付；如有首选和次选专业，在 PS 里说清楚动机</li>
      <li>别只靠 QS 排名选校：专业排名、课程质量、城市就业市场同样重要</li>
    </ul>`,
    res:[{type:"xhs",kw:"留学选校梯队 冲稳保 怎么配 英国美国"},{type:"bili",kw:"硕士留学 选校策略 冲稳保梯队 DIY申请"}]},

  {ic:"📨",t:"拿到结果后：offer 对比 & 常见拒信原因",
    b:`<ul>
      <li><b>对比 Offer 的 5 个维度</b>：奖学金减免金额 / 课程质量（Modules）/ 城市就业市场 / 毕业工签年限 / 校友网络</li>
      <li><b>有条件 Offer（Con-offer）</b>：常见条件：语言达标 / 均分达标 / 拿到毕业证；务必在截止日前满足并提交证明</li>
      <li><b>拒信常见原因</b>：均分未达线（双非被 list 排除）/ 文书同质化 / 材料不完整 / 申请太晚名额满 / 语言未出分</li>
      <li><b>被拒可做的事</b>：联系系办询问反馈（部分学校会给）；考虑 resit 或 re-apply 下一轮；重新评估选校策略</li>
      <li>拿到多个 offer 后可向各校询问奖学金/bursary，部分学校有但不主动告知</li>
    </ul>`,
    res:[{type:"xhs",kw:"留学offer对比 如何选择 拒信原因分析"},{type:"bili",kw:"硕士留学被拒原因 offer比较 如何决策"}]},

  {ic:"🛂",t:"毕业工签 & 就业路径：选国家时比排名更重要",
    b:`<ul>
      <li><b>工签时长排行</b>：澳洲 485（2–4年）≈ 美国 STEM OPT（3年）> 英国 Graduate Route（2年）> 加拿大 PGWP（≤3年）> 其他</li>
      <li><b>工签含金量</b>：无需雇主担保（英澳加）&gt; 需担保但门槛低（荷/德/法）&gt; 需雇主担保且有薪资要求（新加坡 EP）</li>

function copyKw(kw,el){
  navigator.clipboard.writeText(kw).then(()=>{
    const sp=el.querySelector(".res-copy");
    if(!sp)return;
    const orig=sp.textContent;
    sp.textContent="✓ 已复制";
    setTimeout(()=>{sp.textContent=orig;},1500);
  }).catch(()=>{});
}

function initTL(){
  /* ── DDL 全局倒计时 ── */
  const now=new Date();
  const nowY=now.getFullYear();
  const ddlItems=Object.entries(KEY_DEADLINES).map(([cid,d])=>{
    let target=new Date(nowY,d.month-1,d.day);
    if(target<now)target=new Date(nowY+1,d.month-1,d.day);
    const days=Math.ceil((target-now)/(864e5));
    const ct=COUNTRIES.find(c=>c.id===cid)||{flag:"🌍",name:cid};
    return{cid,flag:ct.flag,name:ct.name,label:d.label,days,note:d.note,target};
  }).sort((a,b)=>a.days-b.days);
  const ddlHtml=`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px">
    <div style="font-size:13px;font-weight:700;margin-bottom:10px">⏰ 各国关键 DDL 倒计时 <span style="font-weight:400;color:var(--muted);font-size:11.5px">（点击跳转对应时间轴）</span></div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      ${ddlItems.map(d=>{
        const urg=d.days<=30?"#ef4444":d.days<=90?"#f59e0b":"#10b981";
        return`<div onclick="selTLCountry='${d.cid}';renderTL();document.getElementById('tl-tabs').scrollIntoView({behavior:'smooth'})" style="cursor:pointer;background:var(--tag-bg);border:1px solid var(--border);border-radius:10px;padding:8px 12px;min-width:130px;flex:1">
          <div style="font-size:13px">${d.flag} ${d.name}</div>
          <div style="font-size:11px;color:var(--muted);margin:2px 0">${d.label}</div>
          <div style="font-size:15px;font-weight:800;color:${urg}">还有 ${d.days} 天</div>
        </div>`;}).join("")}
    </div>
  </div>`;
  document.getElementById("s-tl").innerHTML=`
    <div class="ptitle">📅 申请时间轴</div>
    <div class="psub">不同国家节奏差别很大（英澳滚动、美国卡截止）。选国家查看对应的授课型硕士时间线。</div>
    ${ddlHtml}
    <div class="country-tabs" id="tl-tabs"></div>
    <div id="tl-body"></div>`;
  renderTL();
}
function daysTo(month,day){
  const now=new Date();
  let target=new Date(now.getFullYear(),month-1,day);
  if(target<=now)target=new Date(now.getFullYear()+1,month-1,day);
  return Math.ceil((target-now)/86400000);
}
function renderTL(){
  document.getElementById("tl-tabs").innerHTML=COUNTRIES.map(c=>`
    <div class="ctab${selTLCountry===c.id?" on":""}" onclick="selTLCountry='${c.id}';renderTL();setHash()"><span style="font-size:16px">${c.flag}</span> ${c.name}</div>`).join("");
  const tl=TIMELINES[selTLCountry];
  const dl=KEY_DEADLINES[selTLCountry];
  const now=new Date();
  const nowM=now.getMonth()+1;
  /* ── 我的申请截止提醒（跨国，读 TrackerV2）── */
  let myDlHtml="";
  {
    const activeTracked=new Set((TrackerV2.data.entries||[])
      .filter(e=>e.status!=="reject"&&e.status!=="offer").map(e=>e.school));
    if(activeTracked.size>0){
      const cFlag={uk:"🇬🇧",us:"🇺🇸",au:"🇦🇺",ca:"🇨🇦",sg:"🇸🇬",hk:"🇭🇰",ch:"🇨🇭",nl:"🇳🇱",jp:"🇯🇵",kr:"🇰🇷",de:"🇩🇪",nz:"🇳🇿",my:"🇲🇾",fr:"🇫🇷",se:"🇸🇪",be:"🇧🇪",dk:"🇩🇰",cn:"🇨🇳"};
      function actHint(d){
        if(d<=14)return{t:"立即提交，核对所有材料完整性",c:"#ef4444"};
        if(d<=30)return{t:"整理最终版 SOP，确认推荐信已提交",c:"#f97316"};
        if(d<=60)return{t:"完善 SOP 初稿，提前催推荐人",c:"#f59e0b"};
        return{t:"起草 SOP，整理成绩单 / 语言成绩",c:"#10b981"};
      }
      const myDls=Object.entries(SCHOOL_DEADLINES)
        .filter(([nm])=>activeTracked.has(nm))
        .flatMap(([nm,dls])=>dls.map(d=>{
          const s=SCHOOLS.find(x=>x.name===nm);
          return{name:nm,prog:d.prog,days:daysTo(d.month,d.day),ctry:s?s.c:"",note:d.note||""};
        }))
        .filter(e=>e.days<=90).sort((a,b)=>a.days-b.days).slice(0,6);
      if(myDls.length){
        const rows=myDls.map(e=>{
          const col=e.days<=14?"#ef4444":e.days<=30?"#f97316":e.days<=60?"#f59e0b":"var(--accent)";
          const act=actHint(e.days);
          return`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
            <div style="text-align:center;min-width:38px;flex-shrink:0">
              <div style="font-weight:800;font-size:16px;color:${col};line-height:1">${e.days}</div>
              <div style="font-size:10px;color:var(--muted)">天</div>
            </div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:700">${cFlag[e.ctry]||""} ${e.name} <span style="font-weight:400;color:var(--muted);font-size:11.5px">${e.prog}</span></div>
              <div style="font-size:12px;color:${act.c};margin-top:3px">→ ${act.t}</div>
            </div>
          </div>`;
        }).join("");
        myDlHtml=`<div class="card" style="margin-bottom:14px;border:1.5px solid #f59e0b;background:rgba(245,158,11,.05)">
          <div style="font-weight:700;font-size:13px;margin-bottom:8px;color:#d97706">⭐ 我的申请截止提醒（90天内）</div>
          ${rows}
          <div style="font-size:11px;color:var(--muted);margin-top:8px">仅含「我的申请」中进行中的院校 · 以各校官网为准</div>
        </div>`;
      }
    }
  }
  /* ── 倒计时横幅 ── */
  let cdHtml="";
  if(dl){
    const days=daysTo(dl.month,dl.day);
    const urgent=days<=30,soon=days<=90;
    const color=urgent?"#ef4444":soon?"#f59e0b":"var(--accent)";
    cdHtml=`<div class="tl-countdown">
      <div class="tl-cd-badge" style="background:${color}">
        <span class="tl-cd-badge-num">${days}</span>天
      </div>
      <div class="tl-cd-info">
        <div class="tl-cd-title">距「${dl.label}」还有 ${days} 天</div>
        <div class="tl-cd-note">${dl.note}</div>
      </div>
      <div style="font-size:11px;color:var(--muted);flex-shrink:0">
        📅 今天 ${now.getFullYear()}年${nowM}月${now.getDate()}日
      </div>
    </div>`;
  }
  /* ── 热门院校精准截止日 ── */
  const sdEntries=Object.entries(SCHOOL_DEADLINES).filter(([name])=>{
    const s=SCHOOLS.find(x=>x.name===name);return s&&s.c===selTLCountry;
  }).map(([name,dls])=>dls.map(d=>({name,prog:d.prog,days:daysTo(d.month,d.day),note:d.note||""}))).flat()
    .filter(e=>e.days<=180).sort((a,b)=>a.days-b.days);
  let sdHtml="";
  if(sdEntries.length){
    const rows=sdEntries.map(e=>{
      const col=e.days<=14?"#ef4444":e.days<=60?"#f97316":"var(--accent)";
      return`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">
        <span style="font-weight:800;color:${col};font-size:15px;min-width:36px;text-align:right">${e.days}</span>
        <span style="font-size:11px;color:var(--muted)">天</span>
        <div style="flex:1;min-width:0">
          <span style="font-weight:600;font-size:13px">${e.name}</span>
          <span style="color:var(--muted);font-size:11.5px;margin-left:6px">${e.prog}</span>
          ${e.note?`<span style="color:var(--muted);font-size:11px;margin-left:4px">· ${e.note}</span>`:""}
        </div>
      </div>`;
    }).join("");
    sdHtml=`<div class="card" style="margin-bottom:14px">
      <div style="font-weight:700;font-size:13px;margin-bottom:8px;color:var(--accent)">🎯 热门院校精准截止日（180天内）</div>
      ${rows}
      <div style="font-size:11px;color:var(--muted);margin-top:8px">滚动录取院校为「建议截止」，以官网为准。</div>
    </div>`;
  }
  if(!tl){
    document.getElementById("tl-body").innerHTML=myDlHtml+cdHtml+sdHtml+`<div class="card" style="color:var(--muted)">${CNAME[selTLCountry]} 的详细申请时间轴整理中——可先参考英 / 美 / 澳 的详版，多数授课型硕士节奏相近（提前 9–18 个月准备、英澳滚动、美欧多有固定截止）。</div>`;
    return;
  }
  /* ── 判断当前处于哪个阶段（按月份关键词匹配）── */
  const monthNames=["一","二","三","四","五","六","七","八","九","十","十一","十二"];
  function phaseMatchesNow(w){
    const str=w||"";
    /* 匹配"X月"中文月份 */
    const found=[];
    monthNames.forEach((n,i)=>{if(str.includes(n+"月"))found.push(i+1);});
    if(found.length){return found.some(m=>m===nowM||m===(nowM-1+12)%12+1);}
    /* 匹配"9–11月"数字月份范围 */
    const rangeM=str.match(/(\d{1,2})[–—-](\d{1,2})\s*月/);
    if(rangeM){
      const a=+rangeM[1],b=+rangeM[2];
      if(a<=b)return nowM>=a&&nowM<=b;
      return nowM>=a||nowM<=b;
    }
    return false;
  }
  const nowIdx=tl.findIndex(ph=>phaseMatchesNow(ph.w));
  /* ── 今日重点面板 ── */
  let todayHtml="";
  if(nowIdx>=0){
    const ph=tl[nowIdx];
    const next=tl[nowIdx+1];
    const urgentDays=dl?daysTo(dl.month,dl.day):999;
    const urgColor=urgentDays<=30?"#ef4444":urgentDays<=90?"#f59e0b":"#10b981";

      <ul style="margin:0 0 8px 0;padding-left:16px;font-size:12.5px;line-height:1.75">
        ${(ph.items||[]).slice(0,3).map(x=>`<li>${x}</li>`).join("")}
      </ul>
      ${next?`<div style="font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:7px;margin-top:2px">⏭ 下一阶段：<b>${next.p}</b>（${next.w}）</div>`:""}
      ${dl?`<div style="font-size:12px;font-weight:700;color:${urgColor};margin-top:7px">⏰ 距「${dl.label}」还有 ${urgentDays} 天</div>`:""}
    </div>`;
  }
  document.getElementById("tl-body").innerHTML=myDlHtml+cdHtml+sdHtml+todayHtml+tl.map((ph,i)=>{
    const isNow=i===nowIdx;
    const tipsHtml=ph.tips&&ph.tips.length?`<ul class="tl-tips">${ph.tips.map(t=>`<li>${t}</li>`).join("")}</ul>`:"";
    const resHtml=ph.res?`<div class="tl-res-btn" onclick="copyKw('${ph.res.kw.replace(/'/g,"\\'")}',this)"><span class="tl-res-ic tl-res-${ph.res.type}">${ph.res.type==="xhs"?"🍠":"B"}</span><span style="flex:1">${ph.res.kw}</span><span class="res-copy">点击复制</span></div>`:"";
    return`<div class="tl-item"${isNow?' style="background:rgba(99,102,241,.04);border-radius:10px;margin-left:-8px;padding-left:8px"':''}>
      <div class="tl-rail">
        <div class="tl-dot"${isNow?' style="background:var(--accent);box-shadow:0 0 0 4px rgba(99,102,241,.2);width:12px;height:12px;margin-left:-2px"':''}></div>
        ${i<tl.length-1?'<div class="tl-line"></div>':''}
      </div>
      <div class="tl-body">
        <div class="tl-phase">${ph.p}${isNow?'<span class="tl-now-tag">📍 当前阶段</span>':''}</div>
        <div class="tl-when">${ph.w}</div>
        <ul>${ph.items.map(x=>`<li>${x}</li>`).join("")}</ul>
        ${tipsHtml}${resHtml}
      </div>
    </div>`;
  }).join("");
}

const LANG_HINTS={
  ielts:{ph:"如 6.5",range:"4.0–9.0",tip:"雅思总分，直接填写"},
  toefl:{ph:"如 95",range:"0–120",tip:"托福总分 → 79≈6.0 / 90≈6.5 / 100≈7.0 / 110≈7.5"},
  pte:{ph:"如 58",range:"10–90",tip:"PTE 总分 → 42≈6.0 / 50≈6.5 / 58≈7.0 / 65≈7.5，适用于澳洲/新西兰"},
  duolingo:{ph:"如 115",range:"10–160",tip:"Duolingo → 95≈6.0 / 110≈6.5 / 120≈7.0 / 130≈7.5"},
  exempt:{ph:"—",range:"",tip:"毕业于英语授课院校 / 母语英语，视为满足语言要求"},
};
const FIELD_META={
  cs:{label:"🖥️ CS / AI / 数据",badge:"f-cs"},
  bus:{label:"💼 商科 / 金融",badge:"f-bus"},
  eng:{label:"⚙️ 工程",badge:"f-eng"},
  sci:{label:"🔬 理学",badge:"f-sci"},
  soc:{label:"📚 人文社科",badge:"f-soc"},
  art:{label:"🎨 建筑 / 设计",badge:"f-art"},
};
function toLang(type,val){
  if(type==="ielts")return val;
  if(type==="toefl"){if(val>=110)return 7.5;if(val>=100)return 7.0;if(val>=90)return 6.5;if(val>=79)return 6.0;if(val>=60)return 5.5;return 5.0;}
  if(type==="pte"){if(val>=79)return 8.0;if(val>=65)return 7.5;if(val>=58)return 7.0;if(val>=50)return 6.5;if(val>=42)return 6.0;return 5.5;}
  if(type==="duolingo"){if(val>=130)return 7.5;if(val>=120)return 7.0;if(val>=110)return 6.5;if(val>=95)return 6.0;return 5.5;}
  if(type==="exempt")return 7.0;
  return val;
}

function runMatch(){
  const bg=document.getElementById("m-bg").value;
  const field=document.getElementById("m-field").value;
  const gpa=parseFloat(document.getElementById("m-gpa").value)||0;
  const country=document.getElementById("m-country").value;
  const langType=document.getElementById("m-lang-type").value;
  const langRaw=parseFloat(document.getElementById("m-lang-score").value)||0;
  const langScore=toLang(langType,langRaw);
  if(!gpa){document.getElementById("match-res").innerHTML=`<div class="card" style="color:var(--muted);text-align:center">请填写均分后再开始匹配</div>`;return;}
  if(langType!=="exempt"&&!langRaw){document.getElementById("match-res").innerHTML=`<div class="card" style="color:var(--muted);text-align:center">请填写语言成绩（或选择「英语豁免」）</div>`;return;}
  const results=PROGRAMS
    .filter(p=>(country==="all"||p.c===country)&&(field==="all"||p.f===field)&&langScore>=p.il)
    .map(p=>{
      const base=p.g[bg]||p.g["211"]||80;
      const diff=gpa-base;
      let lvl,cls;
      if(diff>= 4){lvl="保底";cls="lvl-safe";}
      else if(diff>=-4){lvl="匹配";cls="lvl-match";}
      else{lvl="冲刺";cls="lvl-reach";}
      return{p,lvl,cls,diff,base};
    })
    .sort((a,b)=>{
      const order={保底:0,匹配:1,冲刺:2};
      if(order[a.lvl]!==order[b.lvl])return order[a.lvl]-order[b.lvl];
      return a.p.qs-b.p.qs;
    });
  if(!results.length){
    document.getElementById("match-res").innerHTML=`<div class="card" style="color:var(--muted);text-align:center;padding:28px">暂无符合条件的项目<br><span style="font-size:12px">可以尝试放宽国家/专业方向筛选，或检查语言分是否达到最低要求</span></div>`;
    return;
  }
  const cnt={保底:0,匹配:0,冲刺:0};results.forEach(r=>cnt[r.lvl]++);
  const langEq=langType!=="exempt"?`（折算雅思 ${toLang(langType,langRaw).toFixed(1)}）`:""
  document.getElementById("match-res").innerHTML=`
    <div class="match-summary">
      <span>共 <span class="ms-num">${results.length}</span> 个项目</span>
      <span>🟣 保底 <span class="ms-num">${cnt["保底"]}</span></span>
      <span>🟢 匹配 <span class="ms-num">${cnt["匹配"]}</span></span>
      <span>🔴 冲刺 <span class="ms-num">${cnt["冲刺"]}</span></span>
      <span style="margin-left:auto;font-size:11.5px">均分 ${gpa} · ${LANG_HINTS[langType]?.ph.replace("如","")!=="—"?langRaw+"分":""} ${langEq}</span>
    </div>
    ${results.map(r=>{
      const fm=FIELD_META[r.p.f]||{label:r.p.f,badge:""};
      const gapAbs=Math.abs(r.diff);
      let gapTxt,gapCls;
      if(r.diff>=4){gapTxt=`均分超线 +${gapAbs} 分，较稳`;gapCls="gap-pos";}
      else if(r.diff>=-4){gapTxt=`均分差距 ${r.diff>=0?"+":""}${r.diff} 分，贴线区间`;gapCls="gap-zero";}
      else{gapTxt=`均分差距 -${gapAbs} 分，需文书/背景出彩`;gapCls="gap-neg";}
      return`<div class="mprog-card">
        <div class="mprog-lvl ${r.cls}">${r.lvl}</div>
        <div class="mprog-main">
          <div class="mprog-school">${FLAG[r.p.c]} ${r.p.s}<span class="mprog-qs">QS ${r.p.qs}</span></div>
          <div class="mprog-prog">${r.p.p}</div>
          <div class="mprog-meta">
            <span class="mprog-field ${fm.badge}">${fm.label}</span>
            <span style="font-size:11px;color:var(--muted);background:var(--tag-bg);padding:2px 8px;border-radius:20px">🗣️ 最低雅思 ${r.p.il}</span>
            ${(()=>{const d=SCHOOL_DIFF[r.p.s];if(!d)return"";const col={极难:"#ef4444",难:"#f97316",中:"#f59e0b",易:"#10b981"}[d.diff]||"#9ca3af";return`<span style="font-size:11px;font-weight:700;color:${col};background:var(--tag-bg);padding:2px 8px;border-radius:20px">难度·${d.diff}</span>`;})()}
            <span class="mprog-gap ${gapCls}">${gapTxt}</span>
          </div>
          <div class="mprog-note">${r.p.note}</div>
          <div class="mprog-res" onclick="copyKw('${r.p.xkw.replace(/'/g,"\\'")}',this)">
            <span style="width:18px;height:18px;border-radius:4px;background:#ff2442;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">🍠</span>
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.p.xkw}</span>
            <span class="res-copy" style="flex-shrink:0">复制搜索词</span>
          </div>
          <div style="display:flex;gap:6px;margin-top:7px">
            ${(()=>{const tracked=TrackerV2.data.entries.some(e=>e.school===r.p.s);return`<button id="mq-add-${r.p.s.replace(/\s/g,'')}" data-orig="＋ 加入我的申请" onclick="quickAddToMine(${JSON.stringify(r.p.s)},${JSON.stringify(r.p.c)},this)" style="flex:1;padding:6px 0;border-radius:8px;border:1.5px solid var(--accent);background:transparent;color:var(--accent);font-size:12px;font-weight:700;cursor:pointer${tracked?';opacity:.55':''}" ${tracked?'disabled':''}>＋${tracked?" 已在追踪中":" 加入我的申请"}</button>`;})()}
            <button onclick="toggleCompare(${JSON.stringify(r.p.s)},${JSON.stringify(r.p.c)});this.textContent=cmpList.some(x=>x.name===${JSON.stringify(r.p.s)})?'✓ 对比中':'⇌ 对比'" style="padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">⇌ 对比</button>
          </div>
        </div>
      </div>`;
    }).join("")}
    <div style="font-size:12px;color:var(--muted);text-align:center;padding:14px 0">⚠️ 分档基于往届中国学生录取数据统计，±4分区间内均属正常波动。文书、推荐信、实习/科研同样重要，最终以官网 Entry Requirements 为准。</div>`;
}

/* ═══════════ 我的申请（追踪） ═══════════ */
const PROG_OPTS=[["","＋ 标记"],["pick","⭐ 选中"],["applying","📝 网申中"],["submitted","📨 已递交"],["offer","🎉 Offer"],["reject","✖ 拒"]];
const PROG_CLS={pick:"st-pick",applying:"st-applying",submitted:"st-submitted",offer:"st-offer",reject:"st-reject"};
const PROG_LBL={pick:"⭐ 选中",applying:"📝 网申中",submitted:"📨 已递交",offer:"🎉 Offer",reject:"✖ 拒"};
const Tracker={data:{},load(){try{this.data=JSON.parse(localStorage.getItem("mh_tracker")||"{}")}catch(e){this.data={}}},save(){try{localStorage.setItem("mh_tracker",JSON.stringify(this.data))}catch(e){}},get(n){return this.data[n]||""},set(n,v){if(v)this.data[n]=v;else delete this.data[n];this.save()}};
const MINE_SCLS={pick:"st-pick",applying:"st-applying",submitted:"st-submitted",offer:"st-offer",reject:"st-reject"};
const MINE_SLBL={pick:"选中",applying:"网申中",submitted:"已递",offer:"已录取",reject:"拒信"};
const MINE_SOPTS=[["pick","⭐ 选中"],["applying","📝 网申中"],["submitted","📨 已递交"],["offer","🎉 Offer"],["reject","✖ 拒信"]];

const TrackerV2={
  data:{entries:[]},
  load(){
    try{
      const raw=localStorage.getItem("mh_v2");
      if(raw){this.data=JSON.parse(raw);}
      else{
        /* 迁移旧数据 */
        Tracker.load();
        const entries=[];let idx=0;
        Object.entries(Tracker.data).forEach(([nm,st])=>{
          if(!st)return;
          const s=SCHOOLS.find(x=>x.name===nm);
          if(s)entries.push({id:"m"+Date.now()+(idx++),school:nm,country:s.c,program:"",deadline:"",status:st,note:""});
        });
        this.data={entries};
        if(entries.length)this.save();
      }
    }catch(e){this.data={entries:[]};}
  },
  save(){try{localStorage.setItem("mh_v2",JSON.stringify(this.data));}catch(e){}},
  add(e){e.id="m"+Date.now()+Math.floor(Math.random()*9999);this.data.entries.push(e);this.save();return e.id;},
  remove(id){this.data.entries=this.data.entries.filter(e=>e.id!==id);this.save();},
  update(id,field,val){const e=this.data.entries.find(x=>x.id===id);if(e){e[field]=val;this.save();}}
};

const ScholTracker={
  data:{items:[]},
  load(){try{const d=JSON.parse(localStorage.getItem("mh_schol")||"{}");this.data=d.items?d:{items:[]};}catch(e){this.data={items:[]};}},
  save(){try{localStorage.setItem("mh_schol",JSON.stringify(this.data));}catch(e){}},
  add(e){e.id="s"+Date.now()+Math.random().toString(36).slice(2,6);this.data.items.push(e);this.save();},
  remove(id){this.data.items=this.data.items.filter(x=>x.id!==id);this.save();},
  update(id,f,v){const x=this.data.items.find(x=>x.id===id);if(x){x[f]=v;this.save();}}
};

const VisaCheckState={
  data:{},
  load(){try{this.data=JSON.parse(localStorage.getItem("mh_vcks")||"{}");}catch(e){this.data={};}},
  save(){try{localStorage.setItem("mh_vcks",JSON.stringify(this.data));}catch(e){}},
  key(country,idx){return country+"_"+idx;},
  get(country,idx){return!!this.data[this.key(country,idx)];},
  toggle(country,idx){const k=this.key(country,idx);this.data[k]=!this.data[k];this.save();}
};

let mineFilter="all";
let scholPanelOpen=true;

function initMine(){TrackerV2.load();ScholTracker.load();renderMine2();}

const SCHOL_STATS=[["plan","计划申请","msp-plan"],["applied","已提交","msp-applied"],["wait","等结果","msp-wait"],["got","已获得🎉","msp-got"],["rej","未获得","msp-rej"]];
const SCHOL_COUNTRY_OPT=COUNTRIES.map(c=>`<option value="${c.id}">${c.flag} ${c.name}</option>`).join("");

function renderScholPanel(){
  const items=ScholTracker.data.items;
  const now=new Date();
  const badge=items.length>0?`<span class="msp-badge">${items.length}</span>`:"";
  const rows=items.length===0
    ?`<div style="color:var(--muted);font-size:12.5px;padding:6px 0">暂无追踪的奖学金，从奖学金全览页添加或在下方手动录入。</div>`
    :items.map(it=>{
      const dl=it.deadline?new Date(it.deadline):null;
      const past=dl&&dl<now;
      const soon=dl&&!past&&(dl-now)<14*86400000;
      const dlBadge=dl?(past?`<span style="color:#ef4444;font-size:11px">⚠已过期</span>`:soon?`<span style="color:#f59e0b;font-size:11px">⏰${Math.ceil((dl-now)/86400000)}天后截止</span>`:""): "";
      const stO=SCHOL_STATS.find(s=>s[0]===it.status)||SCHOL_STATS[0];
      const cFlag=COUNTRIES.find(c=>c.id===it.country);
      return`<div class="msp-row">
        <span class="msp-name">${cFlag?cFlag.flag:""} ${it.name}</span>
        ${it.amt?`<span style="font-size:11px;color:var(--muted)">${it.amt}</span>`:""}
        ${it.deadline?`<span style="font-size:11px;color:var(--muted)">${it.deadline} ${dlBadge}</span>`:""}
        <select class="msp-sel" style="font-size:11px;padding:3px 6px" onchange="ScholTracker.update('${it.id}','status',this.value);renderMine2()">
          ${SCHOL_STATS.map(s=>`<option value="${s[0]}"${it.status===s[0]?" selected":""}>${s[1]}</option>`).join("")}
        </select>
        <span class="msp-stat ${stO[2]}">${stO[1]}</span>
        <button class="msp-rm" onclick="ScholTracker.remove('${it.id}');renderMine2()" title="删除">✕</button>
      </div>`;
    }).join("");
  return`<div class="mine-schol-panel">
    <div class="mine-schol-hd" onclick="toggleScholPanel()">
      💰 奖学金追踪 ${badge}
      <span style="margin-left:auto;font-size:11px;color:var(--muted)">${scholPanelOpen?"▲":"▼"}</span>
    </div>
    <div class="mine-schol-body${scholPanelOpen?"":" hidden"}">
      <div class="msp-add-form">
        <input class="msp-inp" id="msp-name" placeholder="奖学金名称（必填）" style="min-width:150px">
        <select class="msp-sel" id="msp-country"><option value="">选国家</option>${SCHOL_COUNTRY_OPT}</select>
        <input class="msp-inp" id="msp-amt" placeholder="金额/级别" style="max-width:110px">
        <input class="msp-inp" id="msp-dl" type="date" style="max-width:130px">
        <select class="msp-sel" id="msp-stat">
          ${SCHOL_STATS.map(s=>`<option value="${s[0]}">${s[1]}</option>`).join("")}
        </select>
        <button class="msp-add-btn" onclick="addSchol()">＋ 添加</button>
      </div>
      ${rows}
      <div style="font-size:11px;color:var(--muted);margin-top:8px">💡 可从「奖学金全览」页点击奖学金条目快速添加到此追踪列表</div>
    </div>
  </div>`;
}
function toggleScholPanel(){scholPanelOpen=!scholPanelOpen;renderMine2();}
function addSchol(){
  const name=document.getElementById("msp-name").value.trim();
  if(!name){alert("请输入奖学金名称");return;}
  ScholTracker.add({
    name,
    country:document.getElementById("msp-country").value,
    amt:document.getElementById("msp-amt").value.trim(),
    deadline:document.getElementById("msp-dl").value,
    status:document.getElementById("msp-stat").value
  });
  renderMine2();
}
function quickAddSchol(name,country,amt){
  ScholTracker.add({name,country,amt,deadline:"",status:"plan"});
  renderMine2();
  switchTab("mine");
  alert("已添加「"+name+"」到奖学金追踪列表！");
}

function renderMine2(){
  const entries=TrackerV2.data.entries;
  /* 统计 */
  const cnt={};MINE_SOPTS.forEach(o=>cnt[o[0]]=0);
  entries.forEach(e=>{if(cnt[e.status]!=null)cnt[e.status]++;});
  /* 国家列表 */
  const usedC=[...new Set(entries.map(e=>e.country))].filter(Boolean);
  /* 过滤 */
  const filtered=mineFilter==="all"?entries:entries.filter(e=>e.country===mineFilter);
  /* 按学校分组 */
  const bySchool={};
  filtered.forEach(e=>{
    if(!bySchool[e.school])bySchool[e.school]={country:e.country,list:[]};
    bySchool[e.school].list.push(e);
  });

  let html=`<div class="ptitle">📋 我的申请</div>
  <div class="mine-toolbar">
    <span class="mt-hint">数据保存在本机浏览器，换设备前请先导出备份。</span>
    <div class="mt-actions">
      <button class="mt-btn primary" onclick="showAddPanel()">＋ 添加申请</button>
      <button class="mt-btn" onclick="exportMine()">💾 导出</button>
      <label class="mt-btn" style="cursor:pointer">📥 导入<input type="file" accept=".json" style="display:none" onchange="importMine(event)"></label>
      <button class="mt-btn" onclick="printMine()">🖨️ PDF 导出</button>
      <button class="mt-btn" onclick="shareMyPick()">📤 分享梯队</button>
    </div>
  </div>`;

  /* ── 整体进度条 ── */
  const total=entries.length;
  const submitted=(cnt.submitted||0)+(cnt.offer||0)+(cnt.reject||0);
  const offered=cnt.offer||0;
  const subPct=total?Math.round(submitted/total*100):0;
  const offerPct=total?Math.round(offered/total*100):0;
  if(total>0){
    /* 下一步建议 */
    let nextStep="";
    if(offered>0)nextStep=`🎉 已拿到 <b>${offered}</b> 个录取！考虑接受 offer 或继续等待其他结果。`;
    else if(submitted>0&&submitted<total)nextStep=`📨 已递交 ${submitted}/${total} 所，继续完成其余 ${total-submitted} 所网申。`;
    else if(submitted===total)nextStep=`✅ 全部 ${total} 所已递交，等待结果中——定期检查邮件！`;
    else if(cnt.applying>0)nextStep=`📝 有 ${cnt.applying} 所正在网申中，建议尽快完成文书并递交。`;
    else nextStep=`⭐ 已选中 ${cnt.pick||0} 所学校，可以开始准备文书材料了。`;
    html+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 16px;margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:13px;font-weight:700">📊 申请进度</span>
        <span style="font-size:12px;color:var(--muted)">${total} 所学校追踪中</span>
      </div>
      <div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-bottom:4px">
          <span>已递交</span><span>${submitted}/${total} 所（${subPct}%）</span>
        </div>
        <div style="height:8px;background:var(--bg);border-radius:6px;overflow:hidden;border:1px solid var(--border)">
          <div style="height:100%;width:${subPct}%;background:var(--accent);border-radius:6px;transition:.4s"></div>
        </div>
      </div>
      ${offered>0?`<div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-bottom:4px">
          <span>已录取</span><span>${offered}/${total} 所（${offerPct}%）</span>
        </div>
        <div style="height:8px;background:var(--bg);border-radius:6px;overflow:hidden;border:1px solid var(--border)">
          <div style="height:100%;width:${offerPct}%;background:#10b981;border-radius:6px;transition:.4s"></div>
        </div>
      </div>`:""}
      <div style="font-size:12.5px;padding:8px 10px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">${nextStep}</div>
    </div>`;
  }
  /* ── 进度漏斗 ── */
  const pipeMain=[["pick","⭐ 选中"],["applying","📝 网申中"],["submitted","📨 已递交"],["offer","🎉 已录取"]];

    <div class="mpipe-stage p-reject">

  /* ── 清单进度提示 ── */
  const ckSt=getCkStats();
  if(ckSt.total>0){

      <button class="mine-ck-link" onclick="switchTab('check')">查看 / 更新清单 →</button>

  }

  /* ── 奖学金追踪面板 ── */
  html+=renderScholPanel();

  /* ── 国家过滤 tabs ── */
  if(usedC.length>1){
    html+=`<div class="mine-ctabs">
      <div class="mine-ctab${mineFilter==="all"?" on":""}" onclick="mineFilter='all';renderMine2()">全部 (${entries.length})</div>
      ${usedC.map(c=>`<div class="mine-ctab${mineFilter===c?" on":""}" onclick="mineFilter='${c}';renderMine2()">${FLAG[c]||""} ${CNAME[c]||c} (${entries.filter(e=>e.country===c).length})</div>`).join("")}
    </div>`;
  }

  /* ── 添加面板 ── */
  html+=`<div id="mine-add-panel" class="mine-add-panel" style="display:none">

      </div>
    </div>
    <div class="map-fg" style="margin-bottom:10px"><label>备注（可选）</label>
      <input id="ap-note" placeholder="如：需要 writing sample / 已联系 XX 教授">
    </div>
    <div class="map-actions">
      <button class="mt-btn" onclick="hideAddPanel()">取消</button>
      <button class="mt-btn primary" onclick="confirmAdd()">✓ 添加</button>
    </div>
  </div>`;

        html+=`<div class="mine-prog-row ${dlClass}">

          <button class="mpr-note-btn${hasNote?" has-note":""}" id="nb-${e.id}" onclick="toggleMineNote('${e.id}')" title="${hasNote?"查看/编辑备注":"添加备注"}">📝</button>
          <button class="mpr-del" data-id="${e.id}" onclick="removeMineEntry(this.dataset.id)" title="删除">✕</button>

        </div>`;
      });
      html+=`<div class="mine-scard-ft">
          <button class="mine-add-prog" data-school="${school.replace(/"/g,"&quot;")}" data-country="${data.country}" onclick="addProgToSchool(this.dataset.school,this.dataset.country)">＋ 添加该校另一个项目</button>

function exportMine(){
  const payload={
    version:2,
    exported:new Date().toISOString(),
    tracker:TrackerV2.data,
    schol:ScholTracker.data,
    visaChecks:VisaCheckState.data,
    checks:CheckState.data,
    fees:FeeState.data,
    fav:[...Fav._load()]
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="master-hub-backup-"+new Date().toISOString().slice(0,10)+".json";
  a.click();URL.revokeObjectURL(a.href);
}
function importMine(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      /* 支持旧版（仅含 entries）和新版（version:2）两种格式 */
      if(d.version===2){
        const cnt=(d.tracker&&d.tracker.entries)?d.tracker.entries.length:0;
        const sc=(d.schol&&d.schol.items)?d.schol.items.length:0;
        if(!confirm(`导入 ${cnt} 条申请记录 + ${sc} 条奖学金记录？当前数据将被覆盖。`))return;
        if(d.tracker)  {TrackerV2.data=d.tracker;TrackerV2.save();}
        if(d.schol)    {ScholTracker.data=d.schol;ScholTracker.save();}
        if(d.visaChecks){VisaCheckState.data=d.visaChecks;VisaCheckState.save();}
        if(d.checks)   {CheckState.data=d.checks;CheckState.save();}
        if(d.fees)     {FeeState.data=d.fees;FeeState.save();}
        if(d.fav&&Array.isArray(d.fav)){Fav._d=new Set(d.fav);try{localStorage.setItem("mh_fav",JSON.stringify(d.fav));}catch(e){}}
        renderMine2();
      } else if(Array.isArray(d.entries)){
        if(!confirm("导入 "+d.entries.length+" 条记录（旧版格式）？当前数据将被覆盖。"))return;
        TrackerV2.data=d;TrackerV2.save();renderMine2();
      } else {
        throw new Error("format");
      }
    }catch(err){alert("文件格式错误，请导入正确的 JSON 备份文件");}
  };
  r.readAsText(f);ev.target.value="";
}

let checkFilter="all", checkTab="list";

const CheckState={
  done:{},
  load(){try{const d=JSON.parse(localStorage.getItem("mh_ck")||"{}");this.done=d;}catch(e){this.done={};}},
  save(){localStorage.setItem("mh_ck",JSON.stringify(this.done));},
  get(id){return !!this.done[id];},
  toggle(id){if(this.done[id])delete this.done[id];else this.done[id]=1;this.save();}
};

const FeeState={
  on:{},ams:{},uns:{},
  load(){
    try{const s=JSON.parse(localStorage.getItem("mh_fees")||"{}");
      this.on=s.on||{};this.ams=s.ams||{};this.uns=s.uns||{};}
    catch(e){this.on={};this.ams={};this.uns={};}
    FEE_ITEMS.forEach(f=>{if(this.on[f.id]===undefined)this.on[f.id]=f.on;});
  },
  save(){localStorage.setItem("mh_fees",JSON.stringify({on:this.on,ams:this.ams,uns:this.uns}));},
  isOn(id){return !!this.on[id];},
  toggle(id){this.on[id]=!this.on[id];this.save();},
  getAmt(f){return this.ams[f.id]!==undefined?this.ams[f.id]:f.amt;},
  setAmt(id,v){this.ams[id]=parseFloat(v)||0;this.save();},
  getUnit(f){return this.uns[f.id]!==undefined?this.uns[f.id]:(f.perUnit?f.unit:1);},
  setUnit(id,v){this.uns[id]=parseInt(v)||1;this.save();}
};

function renderFeeCalc(){
  const el=document.getElementById("ck-fee-body");if(!el)return;
  el.innerHTML=FEE_CATS.map(cat=>{
    const items=FEE_ITEMS.filter(f=>f.cat===cat.id);
    const subtotal=items.reduce((s,f)=>{
      if(!FeeState.isOn(f.id))return s;
      return s+FeeState.getAmt(f)*(f.perUnit?FeeState.getUnit(f):1)*((FEE_RATES[f.cur])||1);
    },0);
    return `<div class="fee-section">
      <div class="fee-sec-hd">
        <span class="fsh-icon">${cat.icon}</span>
        <span class="fsh-lbl">${cat.label}</span>
        <span class="fsh-subtotal" id="fsub-${cat.id}">¥ ${Math.round(subtotal).toLocaleString()}</span>
      </div>
      ${items.map(f=>{
        const on=FeeState.isOn(f.id);
        const amt=FeeState.getAmt(f);
        const unit=FeeState.getUnit(f);
        const cnyVal=Math.round(amt*(f.perUnit?unit:1)*((FEE_RATES[f.cur])||1));
        return `<div class="fee-row${on?"":" fee-off"}" id="fr-${f.id}">
          <div class="fee-cb2${on?" checked":""}" onclick="toggleFeeItem('${f.id}','${cat.id}')"></div>
          <div class="fee-meta">
            <div class="fee-lbl">${f.lbl}</div>
            <div class="fee-note2">${f.note}</div>
          </div>
          <div class="fee-inputs">
            <input class="fee-inp" type="number" value="${amt}" min="0" step="1" placeholder="金额"
              onchange="FeeState.setAmt('${f.id}',this.value);updateFeeRow('${f.id}','${cat.id}')">
            <span style="color:var(--muted);font-size:11px">${f.cur}</span>
            ${f.perUnit?`× <input class="fee-inp" style="width:44px" type="number" value="${unit}" min="1" step="1" placeholder="数量"
              onchange="FeeState.setUnit('${f.id}',this.value);updateFeeRow('${f.id}','${cat.id}')"> 所/次`:""}
          </div>
          <div class="fee-cny-val" id="fcny-${f.id}">¥ ${cnyVal.toLocaleString()}</div>
        </div>`;
      }).join("")}
    </div>`;
  }).join("");
  updateFeeTotal();
}

function toggleFeeItem(id,catId){
  FeeState.toggle(id);
  const row=document.getElementById("fr-"+id);
  const cb=document.querySelector(`#fr-${id} .fee-cb2`);
  if(row)row.classList.toggle("fee-off",!FeeState.isOn(id));
  if(cb)cb.classList.toggle("checked",FeeState.isOn(id));
  updateFeeSubtotal(catId);
  updateFeeTotal();
}

function updateFeeRow(id,catId){
  const f=FEE_ITEMS.find(x=>x.id===id);if(!f)return;
  const amt=FeeState.getAmt(f);
  const unit=FeeState.getUnit(f);
  const cnyVal=Math.round(amt*(f.perUnit?unit:1)*((FEE_RATES[f.cur])||1));
  const el=document.getElementById("fcny-"+id);
  if(el)el.textContent="¥ "+cnyVal.toLocaleString();
  updateFeeSubtotal(catId);
  updateFeeTotal();
}

function updateFeeSubtotal(catId){
  const items=FEE_ITEMS.filter(f=>f.cat===catId);
  const subtotal=items.reduce((s,f)=>{
    if(!FeeState.isOn(f.id))return s;
    return s+FeeState.getAmt(f)*(f.perUnit?FeeState.getUnit(f):1)*((FEE_RATES[f.cur])||1);
  },0);
  const el=document.getElementById("fsub-"+catId);
  if(el)el.textContent="¥ "+Math.round(subtotal).toLocaleString();
}

function updateFeeTotal(){
  const total=FEE_ITEMS.reduce((s,f)=>{
    if(!FeeState.isOn(f.id))return s;
    return s+FeeState.getAmt(f)*(f.perUnit?FeeState.getUnit(f):1)*((FEE_RATES[f.cur])||1);
  },0);
  const el=document.getElementById("fee-grand-total");
  if(el)el.textContent="¥ "+Math.round(total).toLocaleString();
}

    html+=`<div class="vg-card">
      <h3>🗓️ 办理时间轴</h3>

        ${ex.timeline.map(t=>`
          <div class="vg-tl-row">
            <div class="vg-tl-dot"></div>

              <div class="vg-tl-note">${t.note}</div>
            </div>
          </div>`).join("")}
      </div>
    </div>`;
  }

  /* ── 3. 材料清单（可打勾）── */
  html+=`<div class="vg-card">
    <h3>📋 材料清单
      <span style="font-size:11.5px;font-weight:400;color:var(--muted);margin-left:4px">${doneCount}/${v.materials.length} 已准备</span>

        <div style="font-size:10px;color:var(--muted);text-align:right">${matPct}%</div>
      </div>
    </h3>
    <div class="vg-mat-grid">
      ${v.materials.map((m,i)=>{
        const ck=VisaCheckState.get(selVisaCountry,i);
        const parts=m.match(/^([^（(]+)(.*)$/)||[m,m,""];
        const lbl=parts[1].trim();
        const sub=(parts[2]||"").replace(/^[（(]/,"").replace(/[）)]$/,"").trim();
        return`<div class="vg-mat-cell${ck?" ck":""}" onclick="VisaCheckState.toggle('${selVisaCountry}',${i});renderVisa()">
          <div class="vg-mat-cb${ck?" ck":""}">${ck?"✓":""}</div>
          <div>
            <div class="vg-mat-txt${ck?" ck":""}">${lbl}</div>
            ${sub?`<div class="vg-mat-sub">${sub}</div>`:""}
          </div>
        </div>`;
      }).join("")}

    ${doneCount>0?`<button style="margin-top:10px;font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer" onclick="VisaCheckState.data={};VisaCheckState.save();renderVisa()">重置打勾</button>`:""}
  </div>`;

  /* ── 4. 注意事项 ── */
  html+=`<div class="vg-card">
    <h3>⚠️ 注意事项 & 常见踩坑</h3>

  /* ── 5. 面试 Q&A（仅部分国家）── */
  if(ex.qa&&ex.qa.length){
    html+=`<div class="vg-card">
      <h3>💬 签证面试 Q&A（高频问题 & 回答思路）</h3>
      <div class="vg-qa">
        ${ex.qa.map(qa=>`
          <div class="vg-qa-item">

            <div class="vg-qa-a">💡 建议思路：${qa.a}</div>
          </div>`).join("")}
      </div>
      <div style="margin-top:10px;font-size:12px;color:#ef4444">⚠️ 避免：回答含糊、表现出移民意图、无法说清资金来源或学习目的。</div>
    </div>`;
  }

  /* ── 6. 到达后必做清单 ── */
  if(ex.arrival&&ex.arrival.length){
    html+=`<div class="vg-card">
      <h3>✈️ 到达后必做清单</h3>
      <div class="vg-arrival">
        ${ex.arrival.map(a=>`
          <div class="vg-arr-cell">
            <div class="vg-arr-lbl">✓ ${a.lbl}</div>
            <div class="vg-arr-note">${a.note}</div>
          </div>`).join("")}
      </div>
    </div>`;
  }

  html+=`</div>`;
  document.getElementById("visa-body").innerHTML=html;
}
