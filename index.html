function globalSearch(kw){
  const drop=document.getElementById("gsearch-drop");
  kw=(kw||"").trim();
  if(!kw){drop.classList.remove("open");return;}
  const lc=kw.toLowerCase();
  const sections=[];

  /* 院校 */
  const schools=SCHOOLS.filter(s=>[s.name,s.en,s.city,...(s.strong||[])].join(" ").toLowerCase().includes(lc)).slice(0,5);
  if(schools.length)sections.push({cat:"🏫 院校",items:schools.map(s=>({
    icon:FLAG[s.c]||"",name:s.name,sub:`QS ${s.qs} · ${CNAME[s.c]}`,
    go:`selCountry='${s.c}';dbSearch=${JSON.stringify(s.name)};switchTab('db');document.getElementById('db-search').value=${JSON.stringify(s.name)};renderSchoolList()`
  }))});

  /* 奖学金 */
  const schols=SCHOL_PRESETS.filter(p=>(p.name+p.note).toLowerCase().includes(lc)).slice(0,4);
  if(schols.length)sections.push({cat:"💰 奖学金",items:schols.map(p=>({
    icon:p.flag,name:p.name,sub:`截止 ${p.dl||"—"}`,
    go:`switchTab('fund')`
  }))});

  /* 国家（概览/签证/时间轴） */
  const ctrs=COUNTRIES.filter(c=>c.name.toLowerCase().includes(lc)||c.id===lc).slice(0,4);
  if(ctrs.length)sections.push({cat:"🌍 国家",items:ctrs.map(c=>({
    icon:c.flag,name:c.name,sub:c.tag||"",
    go:`selOverview='${c.id}';selTLCountry='${c.id}';selVisaCountry='${c.id}';switchTab('country')`
  }))});

  /* 时间轴阶段 */
  const tlHits=[];
  Object.entries(TIMELINES).forEach(([cid,phases])=>{
    const ct=COUNTRIES.find(c=>c.id===cid)||{};
    phases.forEach(ph=>{
      if((ph.p+(ph.items||[]).join(" ")).toLowerCase().includes(lc)){
        tlHits.push({icon:ct.flag||"📅",name:ph.p,sub:`${ct.name||cid} · ${ph.w}`,
          go:`selTLCountry='${cid}';switchTab('tl')`});
      }
    });
  });
  if(tlHits.length)sections.push({cat:"📅 时间轴阶段",items:tlHits.slice(0,4)});

  /* 申请要点 */
  const guides=GUIDE.filter(g=>(g.t+(g.b||"")).toLowerCase().includes(lc)).slice(0,3);
  if(guides.length)sections.push({cat:"📖 申请要点",items:guides.map(g=>({
    icon:"",name:g.ic+" "+g.t.split("：")[0].split(":")[0],sub:"",
    go:`switchTab('guide')`
  }))});

  if(!sections.length){
    drop.innerHTML=`<div class="gs-empty">没有找到"${kw}"相关内容<br><span style="font-size:11.5px">试试院校名/国家名/奖学金关键词</span></div>`;
    drop.classList.add("open");
    return;
  }
  drop.innerHTML=sections.map(sec=>`
    <div class="gs-cat">${sec.cat}</div>
    ${sec.items.map(it=>`<div class="gs-row" onclick="${it.go};document.getElementById('gsearch-drop').classList.remove('open');document.getElementById('gsearch').value=''">
      ${it.icon?`<span style="font-size:15px;flex-shrink:0">${it.icon}</span>`:""}
      <span class="gs-row-name">${it.name}</span>
      ${it.sub?`<span class="gs-row-sub">${it.sub}</span>`:""}
    </div>`).join("")}`).join("");
  drop.classList.add("open");
}
document.addEventListener("click",e=>{if(!e.target.closest("#gsearch-wrap"))document.getElementById("gsearch-drop")?.classList.remove("open");});

/* ── 复制分享链接 ── */
function copyShareLink(el){
  const orig=el.textContent;
  const done=()=>{el.textContent="✓";setTimeout(()=>{el.textContent=orig;},1500);};
  if(navigator.clipboard){navigator.clipboard.writeText(location.href).then(done).catch(()=>{fallback();});}
  else{fallback();}
  function fallback(){const i=document.createElement("input");i.value=location.href;document.body.appendChild(i);i.select();document.execCommand("copy");document.body.removeChild(i);done();}
}

/* ═══════════ Hash 路由 ═══════════ */
function getHashParams(){
  const p={};
  location.hash.slice(1).split("&").forEach(s=>{const[k,v]=s.split("=");if(k)p[k]=decodeURIComponent(v||"");});
  return p;
}
function setHash(){
  const p={tab:curTab};
  if(curTab==="db"&&selCountry!=="all")p.c=selCountry;
  else if(curTab==="tl")p.c=selTLCountry;
  else if(curTab==="ov")p.c=selOverview;
  else if(curTab==="visa")p.c=selVisaCountry;
  else if(curTab==="career")p.c=selCareer;
  else if(curTab==="match"&&selCountry!=="all")p.c=selCountry;
  history.replaceState(null,"","#"+Object.entries(p).map(([k,v])=>k+"="+encodeURIComponent(v)).join("&"));
}
function applyHash(){
  const p=getHashParams();
  if(!p.tab)return;
  const id=p.tab;
  if(p.c){
    if(id==="db"||id==="match")selCountry=p.c;
    else if(id==="tl")selTLCountry=p.c;
    else if(id==="ov")selOverview=p.c;
    else if(id==="visa")selVisaCountry=p.c;
    else if(id==="career")selCareer=p.c;
  }
  curTab=id;
}
window.addEventListener("popstate",()=>{applyHash();switchTab(curTab);});

function shareMyPick(){
  const entries=(TrackerV2.data.entries||[]);
  if(!entries.length){alert("还没有添加申请记录，先在「我的申请」添加学校。");return;}
  const tiers={pick:[],applying:[],submitted:[],offer:[],reject:[]};
  const unlabeled=[];
  entries.forEach(e=>{
    if(e.prog&&tiers[e.prog])tiers[e.prog].push(e);
    else unlabeled.push(e);
  });
  const groups=[
    {label:"🎉 已录取",color:"#10b981",items:tiers.offer},
    {label:"📨 已递交",color:"#6366f1",items:tiers.submitted},
    {label:"📝 网申中",color:"#f59e0b",items:tiers.applying},
    {label:"⭐ 已选定",color:"#4f46e5",items:tiers.pick},
  ].filter(g=>g.items.length);
  if(unlabeled.length)groups.push({label:"📋 备选",color:"#9296a3",items:unlabeled});
  if(!groups.length){alert("暂无有效申请记录");return;}

  const isDark=document.body.classList.contains("dark");
  const BG=isDark?"#14151a":"#f7f7fb";
  const CARD=isDark?"#1c1d24":"#ffffff";
  const FG=isDark?"#e7e7ee":"#1f2430";
  const MUT=isDark?"#9296a3":"#6b7280";
  const BORDER=isDark?"#2d2e38":"#e6e6ee";
  const ACCENT="#4f46e5";

  const ROW_H=34,HEADER_H=36,GROUP_H=28,PAD=20,W=520;
  let totalRows=groups.reduce((s,g)=>s+g.items.length,0);
  const H=PAD*2+60+groups.length*(GROUP_H+6)+totalRows*ROW_H+30;

  const canvas=document.createElement("canvas");
  canvas.width=W*2;canvas.height=H*2;
  const ctx=canvas.getContext("2d");
  ctx.scale(2,2);

  // background
  ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);

  // header bar
  ctx.fillStyle=ACCENT;ctx.beginPath();
  ctx.roundRect(0,0,W,56,0);ctx.fill();
  ctx.fillStyle="#fff";ctx.font="bold 17px system-ui,sans-serif";
  ctx.textAlign="left";ctx.fillText("🎓 我的硕士申请梯队",PAD,35);
  ctx.font="11px system-ui,sans-serif";ctx.fillStyle="rgba(255,255,255,0.75)";
  ctx.fillText(`${entries.length} 所院校 · 生成于 ${new Date().toLocaleDateString("zh-CN")}`,PAD,50);

  let y=70;
  groups.forEach(g=>{
    // group label
    ctx.fillStyle=g.color;ctx.font="bold 13px system-ui,sans-serif";
    ctx.textAlign="left";ctx.fillText(g.label,PAD,y+18);
    ctx.fillStyle=BORDER;ctx.fillRect(PAD+80,y+14,W-PAD*2-80,1);
    y+=GROUP_H+4;

    g.items.forEach(e=>{
      // row bg
      ctx.fillStyle=CARD;ctx.beginPath();
      ctx.roundRect(PAD,y,W-PAD*2,ROW_H-2,6);ctx.fill();
      // flag + name
      ctx.font="13px system-ui,sans-serif";ctx.fillStyle=FG;
      const flag=FLAG[e.country]||"";
      ctx.fillText(flag+" "+e.school,PAD+10,y+22);
      // QS badge
      const sc=SCHOOLS.find(s=>s.name===e.school);
      if(sc){
        ctx.fillStyle=ACCENT;ctx.font="bold 10px system-ui,sans-serif";
        ctx.textAlign="right";ctx.fillText("QS #"+sc.qs,W-PAD-8,y+22);
        ctx.textAlign="left";
      }
      y+=ROW_H;
    });
    y+=6;
  });

  // footer
  ctx.fillStyle=MUT;ctx.font="10px system-ui,sans-serif";ctx.textAlign="center";
  ctx.fillText("生成自 github.com/BenjaminJason/master-hub",W/2,H-8);

  canvas.toBlob(blob=>{
    if(!blob)return;
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="my-study-pick-"+new Date().toISOString().slice(0,10)+".png";
    a.click();URL.revokeObjectURL(url);
  },"image/png");
}

/* ── PWA Service Worker 注册 ── */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}
</script>
