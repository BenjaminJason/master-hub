<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学学习舱 · Math Studio</title>
<style>
  :root{
    --bg:#0f1117;--panel:#171a23;--panel2:#1e222e;--line:#2a2f3d;--text:#e7e9ee;
    --muted:#9aa3b2;--accent:#6ea8fe;--accent2:#7ee0c0;--warn:#f0b86e;--chip:#262b39;
    --shadow:0 4px 18px rgba(0,0,0,.35);--grid:#2a3142;
  }
  body.light{--bg:#f5f6f8;--panel:#fff;--panel2:#f0f2f6;--line:#e2e5eb;--text:#1a1d24;
    --muted:#5d6675;--accent:#2f6fed;--accent2:#1d9b73;--warn:#c8861f;--chip:#eef1f6;
    --shadow:0 4px 18px rgba(0,0,0,.08);--grid:#dfe3ea;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",Segoe UI,sans-serif;
       background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
  .app{display:grid;grid-template-columns:210px 1fr 340px;height:100vh}
  /* 一级：领域书签 */
  .sidebar{background:var(--panel);border-right:1px solid var(--line);padding:16px 10px;overflow-y:auto}
  .brand{font-weight:700;font-size:16px;padding:4px 8px 12px;display:flex;align-items:center;gap:7px}
  .brand small{font-weight:400;color:var(--muted);font-size:11px}
  .navitem{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;
           color:var(--muted);font-size:13.5px;margin-bottom:2px;transition:.12s}
  .navitem:hover{background:var(--panel2);color:var(--text)}
  .navitem.active{background:var(--accent);color:#fff;font-weight:600}
  .navitem .cnt{margin-left:auto;font-size:11px;opacity:.7}
  .navsep{font-size:10px;color:var(--muted);letter-spacing:1px;padding:12px 10px 5px}
  .badge{font-size:9px;background:var(--accent2);color:#06281f;border-radius:5px;padding:1px 5px;margin-left:6px;font-weight:700}
  /* 中间：二级模块 + 内容 */
  .main{overflow-y:auto;padding:20px 26px}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .crumb{color:var(--muted);font-size:13px}
  .crumb b{color:var(--text)}
  .toggle{margin-left:auto;background:var(--panel);border:1px solid var(--line);color:var(--muted);
          padding:7px 11px;border-radius:9px;cursor:pointer;font-size:12.5px}
  /* 模块标签条（嵌套二级导航） */
  .modtabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;border-bottom:1px solid var(--line);padding-bottom:14px}
  .modtab{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:8px 13px;
          border-radius:9px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:7px;transition:.12s}
  .modtab:hover{color:var(--text)}
  .modtab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .modtab .dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
  .modtab.on .dot{background:#fff}
  .modtab.mdone .dot{background:var(--accent2)}
  h1{font-size:23px;margin:2px 0 6px}
  .lead{color:var(--muted);font-size:14px;line-height:1.65;margin:0 0 20px}
  /* 视频 */
  .videowrap{position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden;
             margin-bottom:8px;box-shadow:var(--shadow);background:#000}
  .videowrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .vmeta{font-size:12px;color:var(--muted);margin-bottom:22px;display:flex;gap:12px;flex-wrap:wrap}
  .vmeta a{color:var(--accent);text-decoration:none}
  /* 逐块讲解 */
  .blocks{display:flex;flex-direction:column;gap:14px;margin-bottom:24px}
  .block{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);
         border-radius:10px;padding:14px 16px}
  .block h4{margin:0 0 7px;font-size:15px;display:flex;align-items:center;gap:8px}
  .block .en{font-size:11.5px;color:var(--muted);font-weight:400;font-style:italic}
  .block p{margin:0;font-size:13.5px;line-height:1.75;color:var(--text)}
  .block .hl{color:var(--accent2);font-weight:600}
  .block .formula{display:inline-block;background:var(--chip);padding:2px 8px;border-radius:6px;
                  font-family:"SF Mono",Consolas,monospace;font-size:13px;margin:2px 0}
  /* 形象化 */
  .vizcard{background:linear-gradient(135deg,var(--panel),var(--panel2));border:1px solid var(--line);
           border-radius:12px;padding:16px;margin-bottom:24px;text-align:center}
  .vizcard .vtitle{font-size:12px;color:var(--warn);margin-bottom:10px;text-align:left}
  .vizcard svg{max-width:100%;height:auto}
  .vizcap{font-size:12px;color:var(--muted);margin-top:10px}
  /* 资料精读：原文→翻译→讲解 */
  .reading{margin-bottom:26px}
  .reading h3{font-size:14px;color:var(--accent2);margin:0 0 4px}
  .reading .rsrc{font-size:11.5px;color:var(--muted);margin-bottom:12px}
  .reading .rsrc a{color:var(--accent);text-decoration:none}
  .rb{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:0;margin-bottom:12px;overflow:hidden}
  .rb .org{padding:11px 14px;font-family:Georgia,"Times New Roman",serif;font-size:13px;line-height:1.7;
           color:var(--muted);font-style:italic;border-left:3px solid var(--muted);background:var(--panel2)}
  .rb .org::before{content:"原文 EN";display:block;font-family:inherit;font-style:normal;font-size:10px;
                   letter-spacing:1px;color:var(--muted);opacity:.7;margin-bottom:4px}
  .rb .zh{padding:11px 14px;font-size:13.5px;line-height:1.7;border-left:3px solid var(--accent)}
  .rb .zh::before{content:"翻译 中";display:block;font-size:10px;letter-spacing:1px;color:var(--accent);margin-bottom:4px}
  .rb .nt{padding:11px 14px;font-size:13px;line-height:1.7;border-left:3px solid var(--warn);background:var(--panel2)}
  .rb .nt::before{content:"讲解 ✦";display:block;font-size:10px;letter-spacing:1px;color:var(--warn);margin-bottom:4px}
  /* 配套资料 */
  .extra{margin-bottom:30px}
  .extra h3{font-size:13px;color:var(--accent2);margin:0 0 10px}
  .reslist{display:flex;flex-direction:column;gap:8px}
  .res{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
       border-radius:9px;padding:10px 12px;font-size:13px}
  .res a{color:var(--text);text-decoration:none;flex:1}
  .res a:hover{color:var(--accent)}
  .res .ty{font-size:11px;padding:2px 7px;border-radius:5px;background:var(--chip);color:var(--muted)}
  .donebar{display:flex;align-items:center;gap:10px;margin-bottom:24px}
  .donebtn{background:var(--accent2);color:#06281f;border:0;padding:9px 16px;border-radius:9px;
           font-weight:600;cursor:pointer;font-size:13px}
  .donebtn.undo{background:var(--panel);color:var(--muted);border:1px solid var(--line)}
  /* 简单卡片视图（未深做的领域） */
  .cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
  .lcard{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:13px 14px}
  .lcard a{color:var(--text);text-decoration:none;font-weight:600;font-size:14px}
  .lcard a:hover{color:var(--accent)}
  .lcard p{color:var(--muted);font-size:12.5px;line-height:1.55;margin:7px 0 0}
  .soon{background:var(--chip);border:1px dashed var(--line);border-radius:11px;padding:18px;
        color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:16px}
  /* 精选 + 更多 */
  .morebar{margin:8px 0 36px;border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .morebar summary{list-style:none;cursor:pointer;padding:13px 16px;font-size:13.5px;font-weight:600;
                   display:flex;align-items:center;gap:8px;background:var(--panel);user-select:none}
  .morebar summary::-webkit-details-marker{display:none}
  .morebar summary .ar{margin-left:auto;color:var(--muted);transition:.2s}
  .morebar[open] summary .ar{transform:rotate(90deg)}
  .coursebar summary{background:linear-gradient(90deg,rgba(124,156,255,.14),transparent)}
  .coursebar .cwhy{margin:14px 16px 6px;font-size:13px;line-height:1.7;color:var(--fg)}
  .coursebar .videowrap,.coursebar .vmeta{margin-left:16px;margin-right:16px}
  .coursebar .ctip{margin:10px 16px 16px;font-size:12px;line-height:1.7;color:var(--muted);
    background:var(--card2,rgba(127,127,127,.08));border-radius:9px;padding:10px 12px}
  .morebar summary small{color:var(--muted);font-weight:400}
  .morebody{padding:6px 16px 16px}
  .morebody .res a{flex:1}
  .morerepo{display:block;margin-top:10px;font-size:12.5px;color:var(--accent);text-decoration:none}
  /* 右侧：双层笔记 */
  .right{background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;height:100vh}
  .rsection{padding:14px 14px}
  .rhead{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;margin-bottom:8px}
  .rhead .tip{margin-left:auto;font-size:11px;color:var(--muted);font-weight:400}
  /* AI 区 */
  .ai{flex:0 0 46%;border-bottom:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  .chatlog{flex:1;overflow-y:auto;padding:4px 2px;display:flex;flex-direction:column;gap:8px}
  .msg{font-size:12.5px;line-height:1.6;padding:8px 11px;border-radius:10px;max-width:90%;white-space:pre-wrap}
  .msg.u{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
  .msg.a{background:var(--panel2);color:var(--text);align-self:flex-start;border-bottom-left-radius:3px}
  .msg.sys{background:transparent;color:var(--muted);font-size:11.5px;align-self:center;text-align:center}
  .chatin{display:flex;gap:6px;margin-top:8px}
  .chatin input{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--text);
                border-radius:9px;padding:8px 11px;font-size:12.5px;outline:none}
  .chatin button{background:var(--accent);color:#fff;border:0;border-radius:9px;padding:0 13px;cursor:pointer;font-size:13px}
  .keyrow{font-size:11px;margin-top:6px}
  .keyrow a{color:var(--accent);cursor:pointer}
  .askwrap{flex:1;display:flex;flex-direction:column;min-height:0}
  .askbox{flex:1;min-height:54px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
          color:var(--text);padding:10px;font-size:13px;line-height:1.6;resize:none;outline:none;font-family:inherit;margin-bottom:8px}
  .copybtn{background:var(--accent);color:#fff;border:0;border-radius:9px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;transition:.12s}
  .copybtn:hover{filter:brightness(1.08)}
  .copybtn.done{background:var(--accent2);color:#06281f}
  .copyhint{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.55}
  /* 笔记区 */
  .mynote{flex:1;display:flex;flex-direction:column;min-height:0}
  .mynote .tools{display:flex;gap:5px;margin-bottom:7px}
  .mynote .tools button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);
                        border-radius:7px;padding:5px 9px;font-size:11.5px;cursor:pointer}
  .mynote textarea{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
                   color:var(--text);padding:11px;font-size:13px;line-height:1.65;resize:none;outline:none;
                   font-family:inherit;min-height:0}
  .savehint{font-size:11px;color:var(--muted);height:14px;text-align:right;margin-top:5px}
  ::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  @media(max-width:1100px){.app{grid-template-columns:1fr}.sidebar,.right{display:none}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">📐 学习舱<small>Math Studio</small></div>
    <div id="nav"></div>
    <div class="navsep">来源</div>
    <div class="navitem" onclick="window.open('https://github.com/rossant/awesome-math','_blank')">⭐ Awesome Math</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="crumb" id="crumb"></div>
      <span class="toggle" onclick="toggleTheme()">🌙 主题</span>
    </div>
    <div class="modtabs" id="modtabs"></div>
    <div id="content"></div>
  </main>

  <aside class="right">
    <!-- 上：AI 问答 -->
    <div class="ai rsection">
      <div class="rhead">🤖 问 AI <span class="tip">零配置 · 免费</span></div>
      <div class="askwrap">
        <textarea id="chatinput" class="askbox" placeholder="打你的问题，例如：这块没懂，举个例子…"></textarea>
        <button class="copybtn" onclick="copyQuestion()">📋 复制问题（已附本模块内容）</button>
        <div class="copyhint">复制后，粘到你常用的 <b>Claude / ChatGPT</b> 网页里回车即可。问题会自动带上你正在学的模块要点，不用再解释背景。</div>
      </div>
    </div>
    <!-- 下：我的笔记 -->
    <div class="mynote rsection">
      <div class="rhead">✍️ 我的笔记 <span class="tip">自动存本地</span></div>
      <div class="tools">
        <button onclick="insertNote('🔗 链接：')">＋链接</button>
        <button onclick="insertNote('\n— '+new Date().toLocaleString()+'\n')">＋时间</button>
        <button onclick="document.getElementById('imgpick').click()">＋图片</button>
        <input type="file" id="imgpick" accept="image/*" style="display:none" onchange="pasteImg(event)">
      </div>
      <textarea id="note" placeholder="随手记：自己的理解、公式、贴链接、贴图…&#10;（图片/链接也会一起存本地）"></textarea>
      <div class="savehint" id="savehint"></div>
    </div>
  </aside>
</div>

<script>
/* =================== 数据 =================== */
/* 线性代数 = 已做透的样板：每个模块含 视频 + 逐块中文讲解 + 形象化SVG + 配套资料 */
const VEC_SVG=`<svg viewBox="0 0 320 200"><defs><marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6ea8fe"/></marker></defs>
<g stroke="var(--grid)" stroke-width="1">${[...Array(9)].map((_,i)=>`<line x1="${i*40}" y1="0" x2="${i*40}" y2="200"/><line x1="0" y1="${i*25}" x2="320" y2="${i*25}"/>`).join('')}</g>
<line x1="0" y1="100" x2="320" y2="100" stroke="var(--muted)" stroke-width="1.5"/><line x1="160" y1="0" x2="160" y2="200" stroke="var(--muted)" stroke-width="1.5"/>
<line x1="160" y1="100" x2="280" y2="40" stroke="#6ea8fe" stroke-width="3" marker-end="url(#ar)"/>
<text x="225" y="55" fill="#6ea8fe" font-size="13">v = [3, 2]</text>
<line x1="160" y1="100" x2="280" y2="100" stroke="var(--accent2)" stroke-width="2" stroke-dasharray="3"/>
<line x1="280" y1="100" x2="280" y2="40" stroke="var(--accent2)" stroke-width="2" stroke-dasharray="3"/></svg>`;
const SPAN_SVG=`<svg viewBox="0 0 320 200"><g stroke="var(--grid)">${[...Array(9)].map((_,i)=>`<line x1="${i*40}" y1="0" x2="${i*40}" y2="200"/><line x1="0" y1="${i*25}" x2="320" y2="${i*25}"/>`).join('')}</g>
<line x1="0" y1="100" x2="320" y2="100" stroke="var(--muted)"/><line x1="160" y1="0" x2="160" y2="200" stroke="var(--muted)"/>
<line x1="160" y1="100" x2="200" y2="100" stroke="#6ea8fe" stroke-width="3"/><text x="202" y="96" fill="#6ea8fe" font-size="12">î</text>
<line x1="160" y1="100" x2="160" y2="60" stroke="var(--accent2)" stroke-width="3"/><text x="146" y="58" fill="var(--accent2)" font-size="12">ĵ</text>
<rect x="60" y="20" width="200" height="160" fill="#6ea8fe" opacity="0.08"/>
<text x="70" y="40" fill="var(--muted)" font-size="12">两个向量张成整个平面</text></svg>`;
const TRANS_SVG=`<svg viewBox="0 0 320 200"><g stroke="var(--grid)">${[...Array(9)].map((_,i)=>`<line x1="${i*40}" y1="0" x2="${i*40}" y2="200"/>`).join('')}</g>
<g stroke="#6ea8fe" stroke-width="1" opacity="0.5">${[...Array(6)].map((_,i)=>`<line x1="${40+i*30}" y1="40" x2="${10+i*30}" y2="160"/>`).join('')}${[...Array(5)].map((_,i)=>`<line x1="40" y1="${40+i*30}" x2="170" y2="${40+i*30}"/>`).join('')}</g>
<line x1="40" y1="160" x2="100" y2="160" stroke="#6ea8fe" stroke-width="3"/><line x1="40" y1="160" x2="70" y2="100" stroke="var(--accent2)" stroke-width="3"/>
<text x="120" y="180" fill="var(--muted)" font-size="11">网格保持平行、等距 → 线性变换</text></svg>`;
const DET_SVG=`<svg viewBox="0 0 320 200"><g stroke="var(--grid)">${[...Array(9)].map((_,i)=>`<line x1="${i*40}" y1="0" x2="${i*40}" y2="200"/><line x1="0" y1="${i*25}" x2="320" y2="${i*25}"/>`).join('')}</g>
<rect x="80" y="80" width="40" height="40" fill="var(--accent2)" opacity="0.3" stroke="var(--accent2)"/><text x="82" y="135" fill="var(--accent2)" font-size="10">原 1×1</text>
<rect x="180" y="40" width="80" height="80" fill="#6ea8fe" opacity="0.25" stroke="#6ea8fe"/><text x="185" y="135" fill="#6ea8fe" font-size="10">变换后 面积×4</text>
<text x="100" y="30" fill="var(--warn)" font-size="13">det = 面积缩放倍数</text></svg>`;
const EIG_SVG=`<svg viewBox="0 0 320 200"><g stroke="var(--grid)">${[...Array(9)].map((_,i)=>`<line x1="${i*40}" y1="0" x2="${i*40}" y2="200"/><line x1="0" y1="${i*25}" x2="320" y2="${i*25}"/>`).join('')}</g>
<line x1="160" y1="100" x2="40" y2="180" stroke="var(--muted)" stroke-dasharray="4"/><line x1="160" y1="100" x2="280" y2="20" stroke="var(--muted)" stroke-dasharray="4"/>
<defs><marker id="ar2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--warn)"/></marker></defs>
<line x1="160" y1="100" x2="220" y2="60" stroke="var(--warn)" stroke-width="3" marker-end="url(#ar2)"/>
<line x1="160" y1="100" x2="250" y2="40" stroke="var(--warn)" stroke-width="1.5" stroke-dasharray="3"/>
<text x="100" y="30" fill="var(--warn)" font-size="12">特征向量：变换后仍在自己那条线上</text></svg>`;
const G=[...Array(9)].map((_,i)=>`<line x1="${i*40}" y1="0" x2="${i*40}" y2="200"/><line x1="0" y1="${i*25}" x2="320" y2="${i*25}"/>`).join('');
const LIM_SVG=`<svg viewBox="0 0 320 200"><g stroke="var(--grid)">${G}</g>
<line x1="0" y1="100" x2="320" y2="100" stroke="var(--muted)"/><line x1="160" y1="0" x2="160" y2="200" stroke="var(--muted)"/>
<path d="M40,170 Q150,150 198,74" fill="none" stroke="#6ea8fe" stroke-width="3"/>
<path d="M202,66 Q240,30 285,18" fill="none" stroke="#6ea8fe" stroke-width="3"/>
<circle cx="200" cy="70" r="5" fill="var(--panel)" stroke="#6ea8fe" stroke-width="2"/>
<line x1="160" y1="70" x2="200" y2="70" stroke="var(--accent2)" stroke-width="1.5" stroke-dasharray="3"/>
<line x1="200" y1="70" x2="200" y2="100" stroke="var(--accent2)" stroke-width="1.5" stroke-dasharray="3"/>
<text x="140" y="66" fill="var(--accent2)" font-size="12">L</text><text x="195" y="116" fill="var(--muted)" font-size="11">a</text>
<text x="60" y="40" fill="var(--muted)" font-size="11">x→a 时函数值趋近 L（这点本身可缺）</text></svg>`;
const DERIV2_SVG=`<svg viewBox="0 0 320 200"><g stroke="var(--grid)">${G}</g>
<line x1="0" y1="120" x2="320" y2="120" stroke="var(--muted)"/>
<path d="M30,175 Q170,175 290,30" fill="none" stroke="#6ea8fe" stroke-width="3"/>
<line x1="120" y1="158" x2="268" y2="58" stroke="var(--warn)" stroke-width="2"/>
<circle cx="194" cy="108" r="4" fill="var(--warn)"/>

          note:"这解释了矩阵乘法为什么那样算、为什么不能随便交换顺序——先做 T 再做 S，和先做 S 再做 T，几何上当然可能完全不同。"},
       ]},
       extra:[{t:"3B1B 第4讲：矩阵乘法=变换的复合",u:"https://www.youtube.com/watch?v=XkY2DOUCWMU",ty:"🎥视频"}]},
      {id:"det",name:"行列式",video:"Ip3X9LOh2dk",
       lead:"一个数字，却能告诉你这个变换把空间「放大」了多少倍。",
       blocks:[
         {h:"行列式的几何意义",en:"Determinant",p:"行列式衡量一个变换<span class='hl'>把面积放大或缩小了多少倍</span>。det=3 表示面积变 3 倍，det=0.5 表示缩小一半。三维里则是体积的缩放倍数。"},
         {h:"负的行列式",en:"Negative det",p:"如果行列式是负的，说明空间被<span class='hl'>翻转了</span>（像把纸翻面）。绝对值仍是面积缩放倍数，符号表示有没有翻面。"},
         {h:"行列式为 0",en:"Zero det",p:"<span class='formula'>det = 0</span> 意味着变换把整个平面<span class='hl'>压扁成一条线甚至一个点</span>——降维了。这等价于「矩阵的列线性相关」，也意味着矩阵不可逆。"},
         {h:"二阶公式",en:"2×2 formula",p:"<span class='formula'>det[[a,b],[c,d]] = ad − bc</span>。记不住没关系，记住它量的是「面积缩放」，公式自然能推。"},
       ],viz:DET_SVG,vizcap:"行列式 = 单位面积被放大的倍数",
       reading:{src:"标准线性代数定义（基于 Wikipedia「Determinant」，CC BY-SA）",url:"https://en.wikipedia.org/wiki/Determinant",items:[
         {en:"The determinant is a scalar value that is a function of the entries of a square matrix. It characterizes some properties of the matrix and of the linear map it represents.",
          zh:"行列式是由方阵元素决定的一个标量值。它刻画了这个矩阵、以及它所代表的那个线性变换的某些性质。",
          note:"先记住它是「一个数」，由整个方阵算出来，用来概括这个变换最关键的特征——尤其是对面积/体积的缩放。"},
         {en:"Geometrically, the absolute value of the determinant is the factor by which the transformation scales areas (2D) or volumes (3D); a negative sign indicates orientation is reversed.",
          zh:"几何上，行列式的绝对值就是该变换对面积（二维）或体积（三维）的缩放倍数；负号则表示「定向（朝向）被翻转了」。",
          note:"这就是视频核心：det=2 → 面积变两倍；det=−2 → 面积两倍并且翻面。绝对值管「放大多少」，符号管「有没有翻面」。"},
         {en:"A square matrix is invertible if and only if its determinant is nonzero. A zero determinant means the transformation collapses space into a lower dimension.",
          zh:"一个方阵可逆，当且仅当它的行列式不为零。行列式为零，意味着这个变换把空间压扁到了更低的维度。",
          note:"det=0 → 平面被压成一条线甚至一个点，信息丢了、回不去，所以矩阵不可逆。这把「行列式 / 可逆 / 降维」三件事串成了同一件事。"},
       ]},
       extra:[]},
      {id:"eig",name:"特征值与特征向量",video:"PFDu9oVAE-g",
       lead:"线代里最常被考、应用最广（PCA、谷歌PageRank、量子力学）的概念。看完这讲你会觉得它其实很自然。",
       blocks:[
         {h:"核心直觉",en:"Eigenvectors",p:"一个变换会把大多数向量「踢离」它原来的方向。但有些特殊向量，变换后<span class='hl'>仍停在自己那条直线上</span>，只是被拉长或压短——这些就是特征向量。"},
         {h:"特征值",en:"Eigenvalues",p:"特征向量被拉伸的<span class='hl'>倍数</span>就是对应的特征值 λ。λ=2 表示这个方向被拉长一倍，λ=-1 表示反向但长度不变，λ=0 表示被压没了。"},
         {h:"定义式",en:"Av = λv",p:"用式子写就是 <span class='formula'>A·v = λ·v</span>：矩阵作用在特征向量上，效果等同于<span class='hl'>只用一个数 λ 去缩放它</span>。这是整个概念的数学浓缩。"},
         {h:"为什么有用",en:"Why useful",p:"找到特征向量等于找到变换的「天然坐标轴」，复杂变换在这套轴下变成简单的缩放——这是降维（PCA）、解微分方程、网页排名背后的同一个想法。"},
       ],viz:EIG_SVG,vizcap:"特征向量：变换后不离开自己的直线",
       reading:{src:"标准线性代数定义（基于 Wikipedia「Eigenvalues and eigenvectors」，CC BY-SA）",url:"https://en.wikipedia.org/wiki/Eigenvalues_and_eigenvectors",items:[
         {en:"An eigenvector of a linear transformation is a nonzero vector that changes at most by a scalar factor when that transformation is applied to it.",
          zh:"一个线性变换的「特征向量」，是这样一个非零向量：当变换作用在它身上时，它至多只被一个标量倍数所改变（方向保持不变）。",
          note:"关键是「方向不变、只被缩放」。大多数向量会被变换「扭」到别的方向去，特征向量是少数能「稳住自己方向」的那些。"},
         {en:"The corresponding eigenvalue, often denoted λ, is the factor by which the eigenvector is scaled. The defining relation is Av = λv.",
          zh:"对应的「特征值」（常记作 λ），就是该特征向量被缩放的倍数。它们的定义关系是 Av = λv。",
          note:"Av = λv 一句话浓缩了全部：左边是「矩阵去作用」，右边是「只乘一个数 λ」。能让两边相等的那个 v，就是特征向量。"},
         {en:"If the eigenvectors form a basis, the matrix can be diagonalized, greatly simplifying computations such as raising the matrix to a power.",
          zh:"如果这些特征向量能构成一组基，矩阵就可以被「对角化」，从而极大简化诸如「矩阵求幂」之类的计算。",
          note:"对角化 = 换到「特征向量这套坐标轴」去看，复杂变换就变成各方向各自独立缩放。这正是 PCA、解微分方程、PageRank 背后的同一招。"},
       ]},
       extra:[{t:"MIT 18.06 特征值章节",u:"https://ocw.mit.edu/courses/18-06-linear-algebra-spring-2010/",ty:"🎥课程"}]},
    ]},

    modules:[
      {id:"lim",name:"极限",video:"kfF40MiS7zA",
       lead:"微积分的地基。导数和积分都建立在「极限」之上——先把「趋近」这件事说清楚。",
       blocks:[
         {h:"极限的直观",en:"Limit",p:"当 x 越来越<span class='hl'>接近</span>某个值 a 时，如果函数值 f(x) 越来越接近一个确定的数 L，就说「x 趋于 a 时 f 的极限是 L」，记作 <span class='formula'>lim&#8202;f(x)=L</span>。"},
         {h:"为什么需要极限",en:"Why",p:"很多关键问题直接代入会算出「0/0」这种没意义的式子（比如求瞬时速度）。极限让我们能<span class='hl'>无限逼近却不必真正到达</span>那个点，从而绕开这种麻烦。"},
         {h:"左极限与右极限",en:"One-sided",p:"从 a 的<span class='hl'>左边</span>靠近、和从<span class='hl'>右边</span>靠近，可能趋向不同的值。只有左右极限相等，整体极限才存在。"},
         {h:"连续",en:"Continuity",p:"如果某点的极限值正好<span class='hl'>等于</span>该点的函数值（<span class='formula'>lim&#8202;f(x)=f(a)</span>），就说函数在这点连续——图像在这里「没有断、没有洞、没有跳」。"},
       ],viz:LIM_SVG,vizcap:"x 趋于 a 时函数值趋近 L（a 点本身可以缺失）",
       reading:{src:"OpenStax《Calculus Vol.1》§2.2（免费开放教材，CC BY）",url:"https://openstax.org/books/calculus-volume-1/pages/2-2-the-limit-of-a-function",items:[
         {en:"Let f(x) be a function defined at all values in an open interval containing a, with the possible exception of a itself. If f(x) gets arbitrarily close to L for all x sufficiently close to a, we say that the limit of f(x) as x approaches a is L.",
          zh:"设函数 f(x) 在包含 a 的某个开区间内处处有定义（a 这一点本身可以例外）。如果当 x 充分接近 a 时，f(x) 能任意地接近 L，就说「x 趋于 a 时 f(x) 的极限为 L」。",
          note:"注意两处措辞：「a 本身可以例外」——极限不关心 a 点处发生了什么，只关心周围；「任意接近」——你要多近它就能多近。这正是图里那个「空心圆」的含义。"},
         {en:"A function f(x) is continuous at a point a if and only if the limit of f(x) as x approaches a exists and equals f(a).",
          zh:"函数 f(x) 在点 a 处「连续」，当且仅当 x 趋于 a 时 f(x) 的极限存在、并且等于 f(a)。",
          note:"连续 = 三件事同时成立：a 点有定义、极限存在、二者相等。少一条就「不连续」——对应图像上的洞、跳跃或断裂。"},
       ]},
       extra:[{t:"3B1B：极限",u:"https://www.youtube.com/watch?v=kfF40MiS7zA",ty:"🎥视频"}]},
      {id:"deriv",name:"导数",video:"9vKqVkMQHKk",
       lead:"导数 = 瞬时变化率。它回答「这一刻变化有多快」，是微积分最核心的工具。",
       blocks:[
         {h:"导数是瞬时变化率",en:"Rate of change",p:"平均速度 = 路程÷时间，但「某一瞬间的速度」呢？导数就是把时间间隔<span class='hl'>无限缩小</span>后得到的那个瞬时变化率。"},
         {h:"几何意义：切线斜率",en:"Slope of tangent",p:"在图像上，导数就是该点<span class='hl'>切线的斜率</span>。斜率越陡，函数变化越快；斜率为 0，说明到了山顶或山谷。"},
         {h:"极限定义",en:"Definition",p:"<span class='formula'>f'(x)=lim&#8202;[f(x+h)−f(x)]/h</span>（h→0）。这正是「割线斜率」在两点<span class='hl'>无限靠近</span>时变成「切线斜率」的过程——又用到了极限。"},
         {h:"求导法则",en:"Rules",p:"实际计算靠几条法则：幂法则 <span class='formula'>(xⁿ)'=n·xⁿ⁻¹</span>、加法、乘积、以及处理复合函数的<span class='hl'>链式法则</span>。记住法则，绝大多数函数都能直接求导。"},
       ],viz:DERIV2_SVG,vizcap:"导数 = 该点切线的斜率 = dy/dx",
       reading:{src:"标准微积分定义（基于 Wikipedia「Derivative」，CC BY-SA）",url:"https://en.wikipedia.org/wiki/Derivative",items:[
         {en:"The derivative of a function of a single variable at a chosen input value, when it exists, is the slope of the tangent line to the graph of the function at that point.",
          zh:"单变量函数在某个选定输入值处的导数（当它存在时），就是函数图像在该点处「切线的斜率」。",
          note:"一句话抓住几何本质：导数 = 切线斜率。「当它存在时」提醒你——有些点（如尖角、断点）没有唯一切线，导数就不存在。"},
         {en:"The derivative is often written as the limit of the difference quotient: f'(x) = lim(h→0) [f(x+h) − f(x)] / h.",
          zh:"导数常写成「差商」的极限：f'(x) = lim(h→0) [f(x+h) − f(x)] / h。",
          note:"[f(x+h)−f(x)]/h 就是连接两点的割线斜率；让 h→0 两点合一，割线就变成切线。所以导数 = 用极限把割线「逼成」切线。"},
       ]},
       extra:[{t:"3B1B 第3讲：求导公式的几何来源",u:"https://www.youtube.com/watch?v=S0_qX4VJhMQ",ty:"🎥视频"}]},
      {id:"int",name:"积分与基本定理",video:"rfG8ce4nNh0",
       lead:"积分求「累积量」——曲线下的面积。而微积分基本定理揭示：积分和导数其实是一对逆运算。",
       blocks:[
         {h:"定积分 = 面积",en:"Definite integral",p:"把曲线下的区域切成很多<span class='hl'>细长矩形</span>求和，再让矩形宽度→0，得到的极限就是定积分，几何上就是「曲线下的面积」。"},
         {h:"不定积分 = 反导数",en:"Antiderivative",p:"不定积分是求导的<span class='hl'>逆操作</span>：已知导数，反推原函数。比如 <span class='formula'>∫2x dx = x² + C</span>，因为 x² 求导正好得 2x。"},
         {h:"微积分基本定理",en:"FTC",p:"这是整门课的高潮：<span class='hl'>积分和导数互为逆运算</span>。它让我们不必真去切矩形求和，而是用反导数直接算面积——<span class='formula'>∫ₐᵇ f = F(b)−F(a)</span>。"},
         {h:"为什么重要",en:"Why",p:"它把「累积」（积分）和「变化率」（导数）这两个看似无关的概念<span class='hl'>统一</span>了起来，也是物理、工程里从加速度推位移、从密度推质量的同一套工具。"},
       ],viz:INT_SVG,vizcap:"定积分 = 曲线下面积 = 矩形求和的极限",
       reading:{src:"标准微积分定义（基于 Wikipedia「Fundamental theorem of calculus」，CC BY-SA）",url:"https://en.wikipedia.org/wiki/Fundamental_theorem_of_calculus",items:[
         {en:"The fundamental theorem of calculus is a theorem that links the concept of differentiating a function with the concept of integrating a function. The two operations are inverses of each other.",
          zh:"微积分基本定理是一条把「对函数求导」与「对函数积分」两个概念联系起来的定理：这两种运算互为逆运算。",
          note:"这是整门微积分最关键的一句话。求导和积分本来像两件事，基本定理说它们其实是一枚硬币的两面——这才让积分可以「算」而不只是「逼近」。"},
         {en:"If f is continuous on [a, b] and F is an antiderivative of f, then the integral of f from a to b equals F(b) − F(a).",
          zh:"如果 f 在区间 [a, b] 上连续，且 F 是 f 的一个反导数，那么 f 从 a 到 b 的积分就等于 F(b) − F(a)。",
          note:"这就是实际算面积的公式：不用切无数个矩形，只要找到反导数 F，代入上下限相减即可。把「无穷求和」变成了「两数相减」。"},
       ]},
       extra:[{t:"MIT 18.01 积分章节",u:"https://ocw.mit.edu/courses/18-01sc-single-variable-calculus-fall-2010/",ty:"🎥课程"}]},
      {id:"taylor",name:"泰勒级数",video:"3d6DsjIBzJ4",
       lead:"用简单的多项式去逼近复杂函数（sin、eˣ…）。计算器算三角函数、物理做近似，背后都是它。",
       blocks:[
         {h:"核心想法",en:"Idea",p:"复杂函数不好算，但<span class='hl'>多项式</span>（只含加减乘和幂）很好算。泰勒级数就是用一串多项式项，把复杂函数在某点附近逼近得越来越准。"},
         {h:"在一点展开",en:"Expansion point",p:"逼近是「<span class='hl'>局部</span>」的：在展开点附近最准，离得越远越不准。最常见的是在 0 处展开（麦克劳林级数）。"},
         {h:"每项都含导数",en:"Coefficients",p:"各项系数由函数在该点的各阶导数决定：<span class='formula'>f(x)=f(0)+f'(0)x+f''(0)x²/2!+…</span>。导数提供了「这点附近怎么弯」的信息。"},
         {h:"用在哪",en:"Uses",p:"计算器求 sin、eˣ、ln，物理里「小角度 sinθ≈θ」的近似，工程里把复杂模型线性化——<span class='hl'>都是截取泰勒级数的前几项</span>。"},
       ],viz:TAY_SVG,vizcap:"多项式（虚线）在中心附近紧贴 sin x（实线），远处发散",
       reading:{src:"标准定义（基于 Wikipedia「Taylor series」，CC BY-SA）",url:"https://en.wikipedia.org/wiki/Taylor_series",items:[
         {en:"The Taylor series of a function is an infinite sum of terms that are expressed in terms of the function's derivatives at a single point.",
          zh:"一个函数的泰勒级数，是一串无穷多项之和，而每一项都由该函数在「某一个点」处的各阶导数表示出来。",
          note:"两个关键词：「某一个点」——逼近是围绕这一点展开的；「各阶导数」——一阶导管斜率、二阶导管弯曲……阶数越高，把函数的形状刻画得越细。"},
         {en:"For most common functions, the function and the sum of its Taylor series are equal near this point. Taylor series are used to approximate a function by polynomials.",
          zh:"对大多数常见函数，在展开点附近，函数本身与它的泰勒级数之和是相等的。泰勒级数被用来「用多项式逼近一个函数」。",
          note:"呼应图里：虚线（多项式）在中心紧贴实线（sin x），离开中心就分道扬镳。所以实用时只取前几项、且只在展开点附近用。"},
       ]},
       extra:[{t:"3B1B：泰勒级数",u:"https://www.youtube.com/watch?v=3d6DsjIBzJ4",ty:"🎥视频"}]},

      {id:"group",name:"群是什么",video:"mH0oCDa74tE",
       lead:"群是抽象代数的起点，专门刻画「对称」与「可逆操作」。理解它，后面的环、域都顺了。",
       blocks:[
         {h:"群的直觉",en:"Group",p:"群 = <span class='hl'>一组「动作」+ 一条组合规则</span>。最典型的例子是正三角形：把它旋转 120°、翻转……所有让它「看起来没变」的操作，合在一起就是一个群。"},
         {h:"四条公理",en:"Axioms",p:"一个集合配上一种运算，满足四条就叫群：<span class='hl'>封闭</span>（两动作接力还是动作）、<span class='hl'>结合律</span>、有<span class='hl'>单位元</span>（什么都不做）、每个元素有<span class='hl'>逆元</span>（动作可撤销）。"},
         {h:"熟悉的例子",en:"Examples",p:"整数在<span class='formula'>加法</span>下是群（0 是单位元，−n 是逆元）；非零有理数在<span class='formula'>乘法</span>下是群。你早就在用群，只是没叫它名字。"},
         {h:"为什么要抽象",en:"Why abstract",p:"把「对称」「可逆」的共性提炼成四条规则后，<span class='hl'>一次证明，处处适用</span>——无论对象是数字、变换还是魔方，只要满足群公理，结论都成立。"},

         {en:"An isomorphism is a bijective homomorphism. If an isomorphism exists between two groups, the groups are called isomorphic and are essentially the same for the purposes of group theory.",

function renderNav(){
  const nav=document.getElementById("nav");nav.innerHTML="";
  for(const[k,v]of Object.entries(DATA)){
    const d=document.createElement("div");
    d.className="navitem"+(k===topic?" active":"");
    const cnt=v.modules?v.modules.length:(v.links?v.links.length:0);
    d.innerHTML=`${v.icon} ${v.name}${v.done?'<span class="badge">已做透</span>':''}<span class="cnt">${cnt}</span>`;
    d.onclick=()=>{topic=k;mod=0;render();};
    nav.appendChild(d);
  }
}

function pasteImg(e){const f=e.target.files[0];if(!f)return;

  const r=new FileReader();r.onload=()=>{insertNote("\n[图片已存：本地]\n");
    LS.notes[ctxKey()+"_img"]=r.result;LS.save();alert("图片已存本地。（当前版笔记区以文字为主，图片预览下一版加）");};
  r.readAsDataURL(f);}

function currentName(){const t=DATA[topic];return t.modules?t.modules[mod].name:t.name;}
function moduleContext(){
  const t=DATA[topic];if(!t.modules)return t.name;
  const m=t.modules[mod];
  return `领域：${t.name}\n模块：${m.name}\n要点：\n`+m.blocks.map(b=>`- ${b.h}：${b.p.replace(/<[^>]+>/g,'')}`).join("\n");
}
function copyQuestion(){
  const inp=document.getElementById("chatinput");const q=inp.value.trim();
  if(!q){inp.focus();return;}
  const payload=`我正在自学数学，下面是我正在学的内容：\n\n${moduleContext()}\n\n我的问题：${q}\n\n请用中文、结合上面的模块内容，多用直觉和例子，简洁地解答。`;
  const btn=document.querySelector('.copybtn');
  const done=()=>{btn.classList.add('done');btn.textContent='✓ 已复制，去粘贴吧';
    setTimeout(()=>{btn.classList.remove('done');btn.textContent='📋 复制问题（已附本模块内容）';},1800);};
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(payload).then(done).catch(()=>fallbackCopy(payload,done));
  else fallbackCopy(payload,done);
}
function fallbackCopy(text,cb){
  const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');cb();}catch(e){alert('复制失败，请手动选中复制。');}
  document.body.removeChild(ta);
}
