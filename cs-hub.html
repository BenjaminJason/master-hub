<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CS 自学舱 · Open Source CS</title>
<style>
:root{
  --bg:#0f1117;--bg2:#161b27;--card:#1c2230;--card2:#222a3a;
  --line:#2a3347;--fg:#e8ecf4;--muted:#6b7a99;--accent:#7c9cff;
  --accent2:#a78bfa;--green:#4ade80;--yellow:#fbbf24;--red:#f87171;
  --tag:#2a3a5c;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--fg);height:100vh;display:flex;flex-direction:column;font-size:14px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* Header */
.hdr{display:flex;align-items:center;gap:14px;padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--line);flex-shrink:0}
.hdr h1{font-size:16px;font-weight:700;letter-spacing:-.3px}
.hdr .sub{font-size:12px;color:var(--muted);margin-left:auto}
.thmbtn{background:var(--card2);border:1px solid var(--line);color:var(--fg);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:12.5px}
.thmbtn:hover{background:var(--card)}

/* Layout */
.body{display:grid;grid-template-columns:220px 1fr 280px;flex:1;overflow:hidden}

/* Left Nav */
.nav{background:var(--bg2);border-right:1px solid var(--line);overflow-y:auto;padding:14px 10px}
.nav-label{font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:6px 8px 4px}
.navitem{padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13.5px;display:flex;align-items:center;gap:8px;margin-bottom:2px;transition:.15s}
.navitem:hover{background:var(--card)}
.navitem.active{background:var(--accent);color:#fff}
.navitem .ni{font-size:16px;flex-shrink:0}
.navitem .nm{flex:1;font-weight:500}
.navitem .nc{font-size:11px;background:rgba(255,255,255,.12);border-radius:20px;padding:1px 7px;flex-shrink:0}
.navitem.active .nc{background:rgba(255,255,255,.2)}

/* Middle */
.main{overflow-y:auto;display:flex;flex-direction:column}
.crumb{padding:14px 22px 0;font-size:12.5px;color:var(--muted)}
.phase-intro{padding:14px 22px 6px}
.phase-intro h2{font-size:18px;font-weight:700;margin-bottom:5px}
.phase-intro .pdesc{font-size:13px;color:var(--muted);line-height:1.6}
.courselist{padding:12px 22px 40px;display:flex;flex-direction:column;gap:16px}

/* Course card */
.ccard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:.15s}
.ccard.done-card{border-color:rgba(74,222,128,.3)}
.chead{padding:16px 18px 10px;display:flex;align-items:flex-start;gap:12px}
.cnum{width:28px;height:28px;border-radius:8px;background:var(--tag);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0;margin-top:1px}
.cinfo{flex:1}
.ctitle{font-size:15px;font-weight:700;margin-bottom:2px}
.cen{font-size:12px;color:var(--muted)}
.cbadge{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--tag);color:var(--accent2);margin-left:6px}
.cmeta{display:flex;flex-wrap:wrap;gap:6px;padding:0 18px 10px 58px}
.mtag{font-size:11.5px;padding:3px 9px;border-radius:6px;background:var(--card2)}
.mtag.prereq{color:var(--yellow)}
.mtag.effort{color:var(--green)}
.mtag.uni{color:var(--accent)}
.cwhy{padding:0 18px 12px 58px;font-size:13px;line-height:1.75;color:#c8d0e0}
.videowrap{margin:0 18px 0;border-radius:10px;overflow:hidden;aspect-ratio:16/9;background:#000}
.videowrap iframe{width:100%;height:100%;border:none;display:block}
.vmeta{padding:8px 18px 0;font-size:12px;color:var(--muted)}
.novideo{margin:0 18px;padding:12px 14px;background:var(--card2);border-radius:9px;font-size:12.5px;color:var(--muted);border-left:3px solid var(--line)}
.cfoot{padding:12px 18px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--line);margin-top:12px}
.courselink{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--accent);color:#fff;border-radius:8px;font-size:12.5px;font-weight:600;text-decoration:none}
.courselink:hover{opacity:.85;text-decoration:none}
.donebtn2{margin-left:auto;padding:7px 14px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--muted);font-size:12.5px;cursor:pointer;transition:.15s}
.donebtn2:hover{border-color:var(--green);color:var(--green)}
.donebtn2.undo{background:rgba(74,222,128,.1);border-color:var(--green);color:var(--green)}

/* Right panel */
.panel{background:var(--bg2);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.panel-section{padding:16px}
.panel-section+.panel-section{border-top:1px solid var(--line)}
.panel h3{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--accent2)}
.chatinput{width:100%;padding:9px 12px;background:var(--card);border:1px solid var(--line);border-radius:9px;color:var(--fg);font-size:13px;resize:none;min-height:80px;font-family:inherit}
.chatinput:focus{outline:none;border-color:var(--accent)}
.copybtn{width:100%;margin-top:8px;padding:9px;background:var(--card2);border:1px solid var(--line);color:var(--fg);border-radius:9px;cursor:pointer;font-size:13px;transition:.2s}
.copybtn:hover{border-color:var(--accent);color:var(--accent)}
.copybtn.done{background:rgba(74,222,128,.1);border-color:var(--green);color:var(--green)}
.ctip2{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.6}
.note{flex:1;width:100%;padding:10px 12px;background:var(--card);border:1px solid var(--line);border-radius:9px;color:var(--fg);font-size:13px;resize:none;font-family:inherit;min-height:120px}
.note:focus{outline:none;border-color:var(--accent2)}
.notesave{font-size:11.5px;color:var(--muted);margin-top:6px}
.progress-bar{background:var(--line);border-radius:20px;height:5px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.4s}
.progress-label{font-size:11.5px;color:var(--muted);margin-top:5px}

/* ask button on card */
.askbtn{padding:6px 12px;border-radius:8px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:12px;cursor:pointer;transition:.15s;white-space:nowrap}
.askbtn:hover{background:rgba(124,156,255,.12)}
.askbtn.done{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.1)}

/* dark/light toggle */
body.light{--bg:#f4f6fb;--bg2:#eef0f6;--card:#fff;--card2:#f0f2f8;--line:#dde1ed;--fg:#1a1f2e;--muted:#7a849e;--tag:#dde5ff}
</style>
</head>
<body>
<div class="hdr">
  <span style="font-size:22px">💻</span>
  <h1>CS 自学舱</h1>
  <span style="font-size:12px;color:var(--muted);background:var(--card);padding:3px 9px;border-radius:6px">基于 open-source-cs · 2.1万 ★</span>
  <div class="sub" id="totalprog"></div>
  <button class="thmbtn" onclick="toggleTheme()">🌓 切换主题</button>
</div>
<div class="body">
  <div class="nav" id="nav"></div>
  <div class="main" id="main">
    <div class="crumb" id="crumb"></div>
    <div class="phase-intro" id="phaseIntro"></div>
    <div class="courselist" id="courselist"></div>
  </div>
  <div class="panel">
    <div class="panel-section">
      <h3>📋 提问 AI</h3>
      <textarea class="chatinput" id="chatinput" placeholder="在这里输入你对当前内容的问题…"></textarea>
      <button class="copybtn" id="copybtn" onclick="copyQuestion()">📋 复制（全阶段上下文）</button>
      <p class="ctip2">先在下面课程卡上点「💬 提问」发单课上下文；这个按钮发整个阶段概览。复制后粘贴到 Claude / ChatGPT。</p>
    </div>
    <div class="panel-section" style="flex:1;display:flex;flex-direction:column">
      <h3>📝 学习笔记</h3>
      <textarea class="note" id="note" placeholder="记下要点、心得、卡住的地方…&#10;支持文字，链接直接粘贴。"></textarea>
      <p class="notesave" id="notesave"></p>
    </div>
    <div class="panel-section">
      <h3>📊 总体进度</h3>
      <div class="progress-bar"><div class="progress-fill" id="progfill"></div></div>
      <div class="progress-label" id="proglabel"></div>
    </div>
  </div>
</div>
<script>
const PHASES={
  basics:{
    name:"入门基础",icon:"🚀",
    desc:"从零开始建立对计算机科学的整体认知。这一阶段只有一门课，但它是整个路径的地基——用 C、Python、SQL 和 Web 把「程序是怎么跑的」彻底讲透。",
    courses:[
      {id:"cs50",name:"CS50：计算机科学导论",en:"CS50's Introduction to Computer Science",uni:"Harvard",
       video:"2WtPyqwTLKM",
       why:"全球最受欢迎的 CS 入门课，没有之一。David Malan 教授用 Scratch 带你一步步走到 C、再到 Python、SQL、Web，每一讲都是「哇原来是这么回事」的感觉。零基础完全可以开始，但学完你对计算机底层的理解会远超很多科班学生。",
       effort:"10周 · 每周10-20小时",prereq:"无前置要求",
       url:"https://cs50.harvard.edu/x/"}
    ]
  },
  programming:{
    name:"编程语言",icon:"💻",
    desc:"系统学习面向对象编程、数据结构，以及编程语言设计背后的核心思想（类型、函数、抽象）。Duke 的 Java 系列打地基，华盛顿大学的 PL 系列拓展视野。",
    courses:[
      {id:"java1",name:"Java 编程：用软件解决问题",en:"Java Programming: Solving Problems with Software",uni:"Duke",
       video:null,
       why:"从零开始学 Java，重点不是语法而是「怎么把一个问题拆解成程序」的思维方式。这是 Duke 经典 Java 系列的第一门，后面五门都建立在它上面。",
       effort:"4周 · 每周4-8小时",prereq:"CS50 或同等入门经验",
       url:"https://www.coursera.org/learn/java-programming"},
      {id:"java2",name:"Java 编程：数组、列表与结构化数据",en:"Java Programming: Arrays, Lists, and Structured Data",uni:"Duke",
       video:null,
       why:"学会用数组和链表存储、组织数据，并理解 CSV 和 JSON 等结构化数据的处理方法——这是几乎所有实际程序都要用到的技能。",
       effort:"4周 · 每周4-8小时",prereq:"上一门 Duke Java",
       url:"https://www.coursera.org/learn/java-programming-arrays-lists-data"},
      {id:"java3",name:"Java 面向对象编程",en:"Object Oriented Programming in Java",uni:"Duke",
       video:null,
       why:"深入面向对象核心：类、继承、多态、接口。理解「为什么要 OOP」比记住语法重要十倍——这门课花大量时间在「设计」而不只是「写代码」。",
       effort:"6周 · 每周4-6小时",prereq:"Java Programming: Arrays, Lists, and Structured Data",
       url:"https://www.coursera.org/learn/object-oriented-java"},
      {id:"java4",name:"数据结构与性能",en:"Data Structures and Performance",uni:"Duke",
       video:null,
       why:"手动实现链表、树、哈希表，并学会用 Big-O 分析算法效率。这门课之后你才真正理解「为什么某个操作慢、某个快」，是面试必备。",
       effort:"6周 · 每周6-10小时",prereq:"面向对象 Java",
       url:"https://www.coursera.org/learn/data-structures-optimizing-performance"},
      {id:"java5",name:"Java 编程：软件设计原则",en:"Java Programming: Principles of Software Design",uni:"Duke",
       video:null,
       why:"学习如何设计「好」的程序：模块化、低耦合、高内聚。从「会写代码」到「会写好代码」的关键跨越。",
       effort:"4周 · 每周4-8小时",prereq:"Java Programming: Arrays, Lists, and Structured Data",
       url:"https://www.coursera.org/learn/java-programming-design-principles"},
      {id:"java6",name:"Java 编程：构建推荐系统",en:"Java Programming: Build a Recommendation System",uni:"Duke",
       video:null,
       why:"综合前五门课，从零构建一个完整的内容推荐系统。真实项目经验：数据分析 + 算法 + OOP 设计全部用到。",
       effort:"4周 · 每周3-6小时",prereq:"Java 软件设计原则",

      {id:"pl_a",name:"编程语言 Part A",en:"Programming Languages, Part A",uni:"UWash",

       effort:"5周 · 每周8-16小时",prereq:"面向对象 Java",
       url:"https://www.coursera.org/learn/programming-languages"},
      {id:"pl_b",name:"编程语言 Part B",en:"Programming Languages, Part B",uni:"UWash",
       video:null,
       why:"从 ML 转到 Racket（Scheme 方言），深入研究动态类型、宏和解释器——这门课让你真正明白「语言是怎么运行的」。",
       effort:"3周 · 每周8-16小时",prereq:"编程语言 Part A",
       url:"https://www.coursera.org/learn/programming-languages-part-b"},
      {id:"pl_c",name:"编程语言 Part C",en:"Programming Languages, Part C",uni:"UWash",
       video:null,
       why:"用 Ruby 研究面向对象与函数式范式的比较，并用 Part A 学到的语言知识来「看懂」Ruby——读完这三门你看任何新语言都会有 30% 的熟悉感。",
       effort:"3周 · 每周8-16小时",prereq:"编程语言 Part B",
       url:"https://www.coursera.org/learn/programming-languages-part-c"}
    ]
  },
  math:{
    name:"数学基础",icon:"📐",
    desc:"CS 所需的数学：微积分提供「连续变化」的直觉（对 ML 不可缺），线性代数是 ML/图形学/数据科学的语言，概率和统计是推断和机器学习的基础。",
    courses:[
      {id:"calc1a",name:"微积分 1A：微分",en:"Calculus 1A: Differentiation",uni:"MIT",

       effort:"15周 · 每周6-10小时",prereq:"微积分 1A",
       url:"https://mitxonline.mit.edu/courses/course-v1:MITxT+18.01.2x/"},
      {id:"calc1c",name:"微积分 1C：坐标系与级数",en:"Calculus 1C: Coordinate Systems & Infinite Series",uni:"MIT",
       video:null,
       why:"泰勒级数、极坐标和参数方程——这些工具在物理仿真、信号处理和数值计算里无处不在。完成这三门你就有了完整的单变量微积分基础。",
       effort:"8周 · 每周6-10小时",prereq:"微积分 1B",
       url:"https://mitxonline.mit.edu/courses/course-v1:MITxT+18.01.3x/"},
      {id:"linalg",name:"线性代数：从基础到前沿",en:"Linear Algebra - Foundations to Frontiers",uni:"UT Austin",
       video:"ZK3O402wf1c",
       why:"向量、矩阵、特征值——这是机器学习、图形渲染、推荐系统的底层语言。UT Austin 的这门课从计算和概念两个维度讲，比单纯记公式深很多。（视频用的 MIT 18.06 Strang 版，同等水平）",

// Storage
const LS={
  done:{},notes:{},
  save(){try{localStorage.setItem("cs_done",JSON.stringify(this.done));localStorage.setItem("cs_notes",JSON.stringify(this.notes));}catch(e){}},
  load(){try{this.done=JSON.parse(localStorage.getItem("cs_done")||"{}");this.notes=JSON.parse(localStorage.getItem("cs_notes")||"{}");}catch(e){}}
};
LS.load();

let phase=Object.keys(PHASES)[0];

function allCourses(){return Object.values(PHASES).flatMap(p=>p.courses);}
function totalDone(){return allCourses().filter(c=>LS.done[c.id]).length;}
function totalAll(){return allCourses().length;}

function ctxKey(){return "note_"+phase;}

function updateProgress(){
  const done=totalDone(),all=totalAll();
  document.getElementById("progfill").style.width=(done/all*100)+"%";
  document.getElementById("proglabel").textContent=`已完成 ${done} / ${all} 门课程`;
  document.getElementById("totalprog").textContent=`${done}/${all} 完成`;
}

function toggleDone(courseId){
  LS.done[courseId]=!LS.done[courseId];
  LS.save();
  render();
}

function courseContext(courseId){
  const c=allCourses().find(x=>x.id===courseId);
  if(!c)return"";
  return `课程：${c.name}（${c.en}）\n来源：${c.uni}\n学时：${c.effort}\n前置：${c.prereq}\n\n课程简介：${c.why}`;
}

function copyForCourse(courseId){
  const q=document.getElementById("chatinput").value.trim();
  if(!q){document.getElementById("chatinput").focus();return;}
  const c=allCourses().find(x=>x.id===courseId);
  const payload=`我正在自学计算机科学（open-source-cs 路线），当前在学：\n\n${courseContext(courseId)}\n\n我的问题：${q}\n\n请用中文，结合上面这门课的内容，多用直觉和例子，简洁地解答。`;
  const btn=document.getElementById("ask_"+courseId);
  const label=btn?btn.textContent:"";
  const done=()=>{if(btn){btn.classList.add("done");btn.textContent="✓ 已复制";
    setTimeout(()=>{btn.classList.remove("done");btn.textContent="💬 提问";},1800);}};
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(payload).then(done).catch(()=>fallbackCopy(payload,done));
  else fallbackCopy(payload,done);
}

function copyQuestion(){
  // 全阶段上下文（右侧面板按钮保留，发整个阶段）
  const q=document.getElementById("chatinput").value.trim();
  if(!q){document.getElementById("chatinput").focus();return;}
  const p=PHASES[phase];
  const ctx=`当前学习阶段：${p.name}\n\n`+p.courses.map(c=>`• ${c.name}（${c.en}）— ${c.uni}，${c.effort}`).join("\n");
  const payload=`我正在自学计算机科学（open-source-cs 路线），当前阶段是「${p.name}」。\n\n${ctx}\n\n我的问题：${q}\n\n请用中文，结合上面的课程内容，多用直觉和例子，简洁地解答。`;
  const btn=document.getElementById("copybtn");
  const done=()=>{btn.classList.add("done");btn.textContent="✓ 已复制";
    setTimeout(()=>{btn.classList.remove("done");btn.textContent="📋 复制（全阶段上下文）";},1800);};
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(payload).then(done).catch(()=>fallbackCopy(payload,done));
  else fallbackCopy(payload,done);
}
function fallbackCopy(text,cb){
  const t=document.createElement("textarea");t.value=text;document.body.appendChild(t);t.select();
  try{document.execCommand("copy");cb();}catch(e){}document.body.removeChild(t);
}

let noteSaveTimer=null;
function onNoteChange(){
  LS.notes[ctxKey()]=document.getElementById("note").value;
  LS.save();
  document.getElementById("notesave").textContent="已自动保存 "+new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});
}

function renderNav(){
  const nav=document.getElementById("nav");nav.innerHTML='<div class="nav-label">学习阶段</div>';
  Object.entries(PHASES).forEach(([k,p])=>{
    const phaseDone=p.courses.filter(c=>LS.done[c.id]).length;
    const d=document.createElement("div");
    d.className="navitem"+(k===phase?" active":"");
    d.innerHTML=`<span class="ni">${p.icon}</span><span class="nm">${p.name}</span><span class="nc">${phaseDone}/${p.courses.length}</span>`;
    d.onclick=()=>{phase=k;render();};
    nav.appendChild(d);
  });
}

function render(){
  renderNav();
  updateProgress();
  const p=PHASES[phase];
  document.getElementById("crumb").innerHTML=`${p.icon} <b>${p.name}</b>`;
  document.getElementById("phaseIntro").innerHTML=`<h2>${p.icon} ${p.name}</h2><p class="pdesc">${p.desc}</p>`;
  const list=document.getElementById("courselist");
  list.innerHTML=p.courses.map((c,i)=>{
    const isDone=LS.done[c.id];
    return `<div class="ccard${isDone?" done-card":""}">
      <div class="chead">
        <div class="cnum">${i+1}</div>
        <div class="cinfo">
          <div class="ctitle">${c.name}${isDone?'<span class="cbadge">✓ 已完成</span>':''}</div>
          <div class="cen">${c.en}</div>
        </div>
      </div>
      <div class="cmeta">
        <span class="mtag uni">🏫 ${c.uni}</span>
        <span class="mtag effort">⏱ ${c.effort}</span>
        <span class="mtag prereq">⚠️ 前置：${c.prereq}</span>
      </div>
      <div class="cwhy">${c.why}</div>
      ${c.video?`<div class="videowrap"><iframe src="https://www.youtube.com/embed/${c.video}" allowfullscreen loading="lazy"></iframe></div>
      <div class="vmeta">🎥 第一讲预览 · <a href="https://www.youtube.com/watch?v=${c.video}" target="_blank">在 YouTube 打开（可开中文字幕）↗</a></div>`
      :`<div class="novideo">📺 该课程视频在 Coursera / edX 平台，登录后可观看（大部分可旁听免费）</div>`}
      <div class="cfoot">
        <a class="courselink" href="${c.url}" target="_blank">🔗 去上这门课 ↗</a>
        <button class="askbtn" id="ask_${c.id}" onclick="copyForCourse('${c.id}')">💬 提问</button>
        <button class="donebtn2 ${isDone?"undo":""}" onclick="toggleDone('${c.id}')">${isDone?"↩ 标记未完成":"✓ 这门学完了"}</button>
      </div>
    </div>`;
  }).join("");
  document.getElementById("note").value=LS.notes[ctxKey()]||"";
  document.getElementById("notesave").textContent="";
  document.getElementById("note").oninput=onNoteChange;
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

render();
</script>
